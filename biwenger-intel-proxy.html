// ─── SERVER URL (auto-detectado) ─────────────────────────────────────────────
// En local (localhost) usa rutas relativas → va al server.js local.
// En GitHub Pages usa la URL de Render → va al servidor en la nube.

// ─── PROBABILIDAD DE JUGAR (futbolfantasy) ───────────────────────────────────
// Mapa: slug de equipo en Biwenger (inglés) → slug en futbolfantasy (español).
// Verificados contra futbolfantasy.com/world-cup/equipos/<slug>.
const FF_TEAM_SLUG = {
  canada:"canada", spain:"espana", usa:"estados-unidos", norway:"noruega",
  "ivory-coast":"costa-de-marfil", turkiye:"turquia", curacao:"curazao",
  "congo-drc":"rd-congo", "saudi-arabia":"arabia-saudi", "south-korea":"corea-del-sur",
  qatar:"catar", germany:"alemania", netherlands:"holanda", japan:"japon",
  morocco:"marruecos", switzerland:"suiza", "new-zealand":"nueva-zelanda",
  "cape-verde":"cabo-verde", "south-africa":"sudafrica", czechia:"republica-checa",
  "czech-republic":"republica-checa", scotland:"escocia", jordan:"jordania",
  tunisia:"tunez", algeria:"argelia", brazil:"brasil", england:"inglaterra",
  france:"francia", portugal:"portugal", croatia:"croacia", mexico:"mexico",
  colombia:"colombia", ecuador:"ecuador", senegal:"senegal", paraguay:"paraguay",
  australia:"australia", uruguay:"uruguay", argentina:"argentina", iran:"iran",
  panama:"panama", egypt:"egipto", ghana:"ghana", haiti:"haiti", uzbekistan:"uzbekistan",
  // slugs que Biwenger ya da en español o con otra forma:
  "nueva-zelanda":"nueva-zelanda", "cabo-verde":"cabo-verde", iraq:"irak",
  bosnia:"bosnia-herzegovina", belgium:"belgica", austria:"austria", sweden:"suecia",
};
const ffSlugFor = team => team && (FF_TEAM_SLUG[team.slug] || null);

// Normaliza nombres para casar Biwenger ↔ futbolfantasy (acentos, letras nórdicas).
const SPECIAL_CHARS = { "ø":"o","å":"a","æ":"ae","œ":"oe","ß":"ss","ð":"d","þ":"th","ł":"l","đ":"d","ı":"i","ŋ":"n" };
const normName = s => (s || "").toLowerCase()
  .replace(/[øåæœßðþłđıŋ]/g, ch => SPECIAL_CHARS[ch] || ch)
  .normalize("NFD").replace(/[̀-ͯ]/g, "")
  .replace(/[^a-z0-9 ]/g, " ").replace(/\s+/g, " ").trim();

// Casa un nombre de Biwenger con la lista de jugadores de futbolfantasy.
const matchProb = (name, ffPlayers) => {
  const bn = normName(name);
  if(!bn || !Array.isArray(ffPlayers)) return null;
  let p = ffPlayers.find(x => x.norm===bn) ||
          ffPlayers.find(x => x.norm.includes(bn) || bn.includes(x.norm));
  if(p) return p;
  const tok = bn.split(" ").sort((a,b)=>b.length-a.length)[0]; // token más largo (apellido)
  if(tok && tok.length>=4) p = ffPlayers.find(x => x.norm.split(" ").includes(tok));
  return p || null;
};
const probColor = p => p==null ? "#94a3b8" : p>=75 ? "#16a34a" : p>=50 ? "#f59e0b" : p>=25 ? "#f97316" : "#dc2626";

// ─── HELPERS ─────────────────────────────────────────────────────────────────
const fmt  = n => n==null ? "—" : `${(n/1_000_000).toFixed(2)}M`;
const fmtK = n => n==null ? "—" : n>=1_000_000 ? `${(n/1_000_000).toFixed(2)}M` : n>=1000 ? `${(n/1000).toFixed(0)}K` : String(n);
const fmtDate = ts => new Date(ts*1000).toLocaleDateString("es-ES",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"});
const initials = name => (name||"??").split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();
const balClass = b => b>15_000_000?"rich":b>5_000_000?"mid":"tight";

// ─── API ─────────────────────────────────────────────────────────────────────
const makeApi = (token, leagueId=LEAGUE_ID) => async (path, opts={}) => {
  const res = await fetch(`${SERVER_URL}${path}`, {
    credentials: "include",
    headers: {
      "Authorization": token,
      "Content-Type":  "application/json",
      "X-League":      String(leagueId),
      "X-Version":     "630",
      "X-User":        String(OWN_USER_ID),
      "Accept":        "application/json, text/plain, */*",
    },
    ...opts
  });
  if(res.status===304) return null;
  const contentType = res.headers.get("content-type") || "";
  if(!res.ok) {
    const errorBody = contentType.includes("application/json")
      ? JSON.stringify(await res.json())
      : (await res.text()).slice(0, 300);
    const looksLikeHtml = /<(!doctype|html|title)/i.test(errorBody);
    if(looksLikeHtml) throw new Error(`HTML response → ${path} :: token invalid or expired`);
    throw new Error(`HTTP ${res.status} → ${path} :: ${errorBody}`);
  }
  if(!contentType.includes("application/json")) {
    const text = (await res.text()).slice(0, 300);
    const looksLikeHtml = /<(!doctype|html|title)/i.test(text);
    if(looksLikeHtml) throw new Error(`HTML response → ${path} :: token invalid or expired`);
    throw new Error(`Non-JSON response → ${path} :: ${text}`);
  }
  const j = await res.json();
  return j.data !== undefined ? j.data : j;
};

// ─── CACHE (localStorage) ─────────────────────────────────────────────────────
const CACHE_KEY_BOARD   = `biw_board_${LEAGUE_ID}`;
const CACHE_KEY_MEMBERS = `biw_members_${LEAGUE_ID}`;

const cacheSave = (board, members) => {
  try {
    const lastEventDate = board.length > 0 ? Math.max(...board.map(e => e.date)) : 0;
    localStorage.setItem(CACHE_KEY_BOARD,   JSON.stringify({ board, lastEventDate, savedAt: Date.now() }));
    localStorage.setItem(CACHE_KEY_MEMBERS, JSON.stringify({ members, savedAt: Date.now() }));
  } catch(e){ console.warn("Cache write failed:", e); }
};

const cacheLoad = () => {
  try {
    const b = localStorage.getItem(CACHE_KEY_BOARD);
    const m = localStorage.getItem(CACHE_KEY_MEMBERS);
    return { board: b ? JSON.parse(b) : null, members: m ? JSON.parse(m) : null };
  } catch(e){ return { board: null, members: null }; }
};

const cacheClear = () => {
  localStorage.removeItem(CACHE_KEY_BOARD);
  localStorage.removeItem(CACHE_KEY_MEMBERS);
};

// ─── PLAYER MAPPER ────────────────────────────────────────────────────────────
async function fetchPlayerMap(api, leagueId) {
  const map = {};
  const tried = [];

  // Strategy 0: cf.biwenger.com competition data — full player list (~1300 jugadores), JSONP
  try {
    tried.push("/cfapi/v2/competitions/world-cup/data (JSONP)");
    const text = await fetch(`${SERVER_URL}/cfapi/v2/competitions/world-cup/data?lang=en&score=3&callback=BIW_CB`)
      .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.text(); });
    // Strip JSONP wrapper: BIW_CB({...}); → parse inner JSON
    const json = JSON.parse(text.replace(/^[^(]+\(/, "").replace(/\);?\s*$/, ""));
    const raw = json?.data?.players || json?.players || {};
    const entries = Array.isArray(raw) ? raw : Object.values(raw);
    for (const p of entries) {
      if (!p?.id) continue;
      map[p.id] = {
        name:     p.name || p.n  || `#${p.id}`,
        slug:     p.slug || p.s  || null,
        position: p.position !== undefined ? p.position : (p.p ?? null),
        price:    p.price    || p.v  || p.value || null,
        team:     p.team?.name || p.t?.n || null,
        teamId:   p.teamID   || p.t?.id || null,
      };
    }
    console.log(`✅ Player map (JSONP): ${Object.keys(map).length} jugadores`);
  } catch(e) {
    console.warn("JSONP player fetch failed:", e.message);
  }

  // Si ya tenemos mapa completo, no hace falta seguir
  if (Object.keys(map).length > 100) return { map, tried };

  // Strategy 1: market endpoint (player objects con nombres)
  try {
    tried.push("/api/v2/market");
    const mkt = await api("/api/v2/market");
    const sales = mkt?.sales || mkt?.data?.sales || [];
    for(const s of sales){
      const p = s.player;
      if(p?.id && p?.name) map[p.id] = { name: p.name, position: p.position, price: p.price, team: p.teamID };
    }
  } catch(e){}

  // Strategy 2: league/competition players endpoints
  const playerEndpoints = [
    `/api/v2/league/${leagueId}/players`,
    `/api/v2/players?competition=world-cup&limit=500&offset=0`,
    `/api/v2/competitions/world-cup/players?limit=500`,
  ];
  for(const ep of playerEndpoints){
    try {
      tried.push(ep);
      const data = await api(ep);
      const players = Array.isArray(data) ? data : (data?.players || data?.data || []);
      if(players.length > 0){
        for(const p of players){
          if(p?.id && p?.name) map[p.id] = { name: p.name, position: p.position, price: p.price, team: p.teamID };
        }
        if(Object.keys(map).length > 10) break;
      }
    } catch(e){}
  }

  return { map, tried };
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function App() {
  const [token, setToken]           = useState(DEFAULT_TOKEN);
  const [tab, setTab]               = useState("once");
  const [lineup, setLineup]         = useState(null);       // alineación titular del usuario
  const [probsByTeam, setProbsByTeam] = useState({});       // ffSlug -> {players:[...]}|"loading"|"error"
  const [playersDB, setPlayersDB]   = useState(null);       // id -> {name, teamID, position}
  const [teamsDB, setTeamsDB]       = useState({});         // teamID -> {name, slug}
  const [leagueUsers, setLeagueUsers] = useState(null);     // [{id,name,players:[ids]}] plantillas rivales
  const [expandedRival, setExpandedRival] = useState(null);
  const [loading, setLoading]       = useState(false);
  const [loadStep, setLoadStep]     = useState("");
  const [error, setError]           = useState(null);
  const [ownBalance, setOwnBalance] = useState(null);
  const [members, setMembers]       = useState({});
  const [playerMap, setPlayerMap]   = useState({});
  const [playerEndpoints, setPlayerEndpoints] = useState([]);
  const [board, setBoard]           = useState([]);
  const [balances, setBalances]     = useState({});
  const [marketData, setMarketData] = useState(null);
  const [lastUpdated, setLastUpdated] = useState(null);
  const [filterUser, setFilterUser] = useState("all");
  const [selectedMgr, setSelectedMgr] = useState(null);
  const [cacheInfo, setCacheInfo]   = useState(null); // {savedAt, count, newCount}

  const apiRef = useRef(makeApi(token));
  useEffect(() => {
    apiRef.current = makeApi(token);
    // Sincronizar token con el servidor para que las alertas de email funcionen
    if (token && token.length > 20) {
      fetch(`${SERVER_URL}/api-local/token`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ token }),
      }).catch(() => {});
    }
  }, [token]);

  // ── Fetch paginated board (incremental: solo eventos tras sinceDate) ──
  // La API devuelve eventos newest-first; paramos cuando encontramos eventos ya cacheados.
  const fetchBoard = async (sinceDate = 0) => {
    const newEvents = [];
    let offset = 0;
    const limit = 50;            // pedimos lo máximo; biwenger pagina de 8 en 8 igualmente
    const MAX_PAGES = 2000;      // tope de seguridad anti-bucle infinito
    for(let page = 0; page < MAX_PAGES; page++){
      setLoadStep(`Tablón... recorriendo board (offset ${offset})`);
      const raw = await apiRef.current(`/api/v2/league/${LEAGUE_ID}/board?offset=${offset}&limit=${limit}`);
      if(!raw) break;
      const items = Array.isArray(raw) ? raw : (raw.board || raw.events || []);
      if(items.length === 0) break;        // página vacía → fin REAL del board
      newEvents.push(...items);
      offset += items.length;              // avanzamos por lo realmente recibido,
                                           // NO por `limit` (biwenger devuelve ~8/página)
    }
    return newEvents;
  };

  // ── Extract players from board events ──
  const extractPlayersFromBoard = (events) => {
    const map = {};
    for(const ev of events){
      for(const c of (Array.isArray(ev.content) ? ev.content : [])){
        const p = c.player;
        if(p && typeof p === "object" && p.id && p.name){
          map[p.id] = { name: p.name, position: p.position, price: p.price };
        }
      }
    }
    return map;
  };

  // ── Extract members (users) from board from/to fields (solo transfer/market) ──
  const extractMembersFromBoard = (events) => {
    const members = {};
    for(const ev of events){
      if(ev.type === "exchange"){
        const c = ev.content || {};
        if(c.from?.id && c.from?.name) members[c.from.id] = { name: c.from.name, icon: c.from.icon || "" };
        if(c.to?.id   && c.to?.name)   members[c.to.id]   = { name: c.to.name,   icon: c.to.icon   || "" };
        continue;
      }
      if(ev.type !== "transfer" && ev.type !== "market") continue;
      for(const c of (Array.isArray(ev.content) ? ev.content : [])){
        if(c.from?.id && c.from?.name) members[c.from.id] = { name: c.from.name, icon: c.from.icon || "" };
        if(c.to?.id   && c.to?.name)   members[c.to.id]   = { name: c.to.name,   icon: c.to.icon   || "" };
      }
    }
    return members;
  };

  // ── Calculate balances ──
  // Contabiliza TODOS los eventos del board que mueven dinero. Validado contra el
  // saldo real de la API: estimado == real (gap 0) con el board completo.
  const calcBalances = (events, memberIds) => {
    const bal = {};
    for(const id of memberIds) bal[id] = START_BUDGET;
    const add = (id, amt) => { if(id != null && bal[id] !== undefined) bal[id] += amt; };
    for(const ev of events){
      // transfer y adminTransfer comparten estructura: array de {from,to,amount}
      if(ev.type === "transfer" || ev.type === "adminTransfer"){
        for(const c of (Array.isArray(ev.content) ? ev.content : [])){
          const amt = c.amount || 0;
          add(c.from?.id,  amt);   // from = VENDEDOR (gana)
          add(c.to?.id,   -amt);   // to   = COMPRADOR (paga)
        }
      } else if(ev.type === "market"){
        for(const c of (Array.isArray(ev.content) ? ev.content : [])){
          const amt = c.amount || 0;
          add(c.to?.id,   -amt);   // to = comprador en el mercado (paga)
          add(c.from?.id,  amt);   // from = vendedor (si lo hay) cobra
        }
      } else if(ev.type === "exchange"){
        // Intercambio: content es un objeto, no un array.
        // 'from' aporta `amount` y recibe `requestedAmount`; 'to' al revés.
        const c      = ev.content || {};
        const amt    = c.amount || 0;            // dinero que pone 'from'
        const reqAmt = c.requestedAmount || 0;   // dinero que pone 'to'
        add(c.from?.id, reqAmt - amt);
        add(c.to?.id,   amt - reqAmt);
      } else if(ev.type === "bonus"){
        // Bonus de admin: array de {user, amount} (puede ser negativo).
        for(const c of (Array.isArray(ev.content) ? ev.content : [])) add(c.user?.id, c.amount || 0);
      } else if(ev.type === "roundFinished"){
        // Premios de jornada: content.results[] con {user, bonus}.
        for(const r of (ev.content?.results || [])) add(r.user?.id, r.bonus || 0);
      }
    }
    return bal;
  };

  // ── MAIN LOAD ──
  const loadAll = useCallback(async (forceRefresh = false) => {
    setLoading(true);
    setError(null);
    try {
      // ── Caché: mostrar datos guardados inmediatamente ──
      const cached = forceRefresh ? { board: null, members: null } : cacheLoad();
      const cachedBoard   = cached.board;
      const cachedMembers = cached.members;
      // Siempre re-leemos el board COMPLETO: la carga incremental + dedup por
      // (date,type) colapsaba operaciones simultáneas (cierres de mercado/jornada
      // comparten timestamp) y perdía ventas/compras → saldos incorrectos.
      const sinceDate = 0;

      if(cachedBoard?.board?.length > 0){
        setBoard(cachedBoard.board);
        setCacheInfo({ savedAt: cachedBoard.savedAt, count: cachedBoard.board.length, newCount: null });
      }
      if(cachedMembers?.members) setMembers(cachedMembers.members);

      // 1. Home (balance real) + League standings — siempre frescos
      setLoadStep("Cuenta y liga...");
      const [home, leagueData] = await Promise.all([
        apiRef.current("/api/v2/home"),
        apiRef.current(`/api/v2/league?include=all,-lastAccess&fields=*,standings,tournaments,group,settings(description)`).catch(()=>null),
      ]);
      const ownUser    = home?.user || {};
      const ownRealBal = ownUser.balance ?? null;
      setOwnBalance(ownRealBal);

      const memberMap = {};
      const standings = leagueData?.standings || [];
      for(const s of (Array.isArray(standings) ? standings : [])){
        memberMap[s.id] = {
          name: s.name || `User ${s.id}`,
          icon: s.icon || "",
          teamValue:   s.teamValue ?? null,
          realBalance: s.id === OWN_USER_ID ? ownRealBal : null,
          position:    s.position ?? null,
        };
      }
      if(!memberMap[OWN_USER_ID]){
        memberMap[OWN_USER_ID] = { name: ownUser.name || "GabiPRO", icon: ownUser.icon || "i/u/11678731.png", realBalance: ownRealBal };
      } else {
        memberMap[OWN_USER_ID].realBalance = ownRealBal;
      }
      setMembers({...memberMap});

      // 2. Board completo (todas las páginas, sin incremental)
      setLoadStep("Cargando board completo...");
      const newEvents  = await fetchBoard(sinceDate);
      // Reconstruimos el board entero desde la API (sin fusionar con caché) para
      // no arrastrar huecos. Deduplicamos por identidad real del evento (fecha +
      // tipo + contenido), no solo (date,type), para no perder operaciones
      // simultáneas distintas.
      const evKey = e => `${e.date}_${e.type}_${JSON.stringify(e.content ?? null)}`;
      const seen = new Set();
      const allBoard = newEvents
        .filter(e => { const k = evKey(e); if(seen.has(k)) return false; seen.add(k); return true; })
        .sort((a,b) => a.date - b.date);
      const fresh = allBoard;
      setBoard(allBoard);

      // Fallback member extraction del board
      const boardMembers = extractMembersFromBoard(allBoard);
      for(const [uid, m] of Object.entries(boardMembers)){
        if(!memberMap[uid]) memberMap[uid] = { name: m.name, icon: m.icon, realBalance: null };
      }
      setMembers({...memberMap});

      // 3. Player map
      setLoadStep("Mapeando jugadores...");
      const boardPlayers = extractPlayersFromBoard(allBoard);
      const { map: apiPlayers, tried } = await fetchPlayerMap(apiRef.current, LEAGUE_ID);
      setPlayerEndpoints(tried);
      const merged = { ...boardPlayers, ...apiPlayers };
      setPlayerMap(merged);

      // 4. Market
      setLoadStep("Mercado...");
      try {
        const mkt = await apiRef.current("/api/v2/market");
        setMarketData(mkt);
        for(const s of (mkt?.sales||[])){
          const p = s.player;
          if(p?.id && p?.name) merged[p.id] = { name:p.name, position:p.position, price:p.price };
        }
        setPlayerMap({...merged});
      } catch(e){}

      // 4b. Alineación titular del usuario (para la pestaña "Mi Once")
      setLoadStep("Alineación...");
      try {
        const u = await apiRef.current("/api/v2/user?fields=*,lineup");
        if(u?.lineup) setLineup(u.lineup);
      } catch(e){}

      // 5. Balances estimados
      const memberIds = Object.keys(memberMap).map(Number);
      const estimated = calcBalances(allBoard, memberIds);
      setBalances(estimated);

      // 6. Guardar en caché
      cacheSave(allBoard, memberMap);
      setCacheInfo({ savedAt: Date.now(), count: allBoard.length, newCount: fresh.length });
      setLastUpdated(new Date());
      setLoadStep("");
    } catch(e){
      setError(e.message);
    } finally {
      setLoading(false);
    }
  }, []);

  useEffect(() => { loadAll(); }, []);

  // ── Cargador de probabilidades en cola (throttled, evita 429 de futbolfantasy) ──
  const probQ = useRef({ pending: [], running: false, handled: new Set() });
  const enqueueProbs = useCallback((slugs) => {
    const st = probQ.current;
    const fresh = [];
    (slugs || []).forEach(s => { if(s && !st.handled.has(s)){ st.handled.add(s); st.pending.push(s); fresh.push(s); } });
    if(fresh.length) setProbsByTeam(prev => { const n = {...prev}; fresh.forEach(s => { if(!n[s]) n[s] = "loading"; }); return n; });
    const run = () => {
      if(st.running) return;
      const slug = st.pending.shift();
      if(!slug) return;
      st.running = true;
      fetch(`${SERVER_URL}/api-local/probabilidades/${slug}`)
        .then(r => r.json())
        .then(j => setProbsByTeam(p => ({ ...p, [slug]: (j && j.players) ? j : "error" })))
        .catch(() => setProbsByTeam(p => ({ ...p, [slug]: "error" })))
        .finally(() => { st.running = false; setTimeout(run, 200); });
    };
    run();
  }, []);

  // ffSlug a partir del teamID (vía teamsDB de Biwenger)
  const ffSlugForTeamId = (teamID) => { const ts = teamsDB[teamID]?.slug; return ts ? (FF_TEAM_SLUG[ts] || null) : null; };

  // Probabilidades del once propio
  useEffect(() => {
    if(!lineup?.players) return;
    enqueueProbs([...new Set(lineup.players.map(p => ffSlugFor(p.team)).filter(Boolean))]);
  }, [lineup]);

  // Carga de datos de rivales (1560 jugadores + 48 equipos + plantillas de los 20 managers)
  const loadRivalsData = useCallback(async () => {
    try {
      const [data, lg] = await Promise.all([
        apiRef.current("/api/v2/competitions/world-cup/data?lang=es&score=3"),
        apiRef.current("/api/v2/league?include=all&fields=*,users(id,name,players)"),
      ]);
      const pdb = {};
      const pls = data?.players ? (Array.isArray(data.players) ? data.players : Object.values(data.players)) : [];
      pls.forEach(p => { pdb[p.id] = { name: p.name, teamID: p.teamID, position: p.position }; });
      const tdb = {};
      const tms = data?.teams ? (Array.isArray(data.teams) ? data.teams : Object.values(data.teams)) : [];
      tms.forEach(t => { tdb[t.id] = { name: t.name, slug: t.slug }; });
      setPlayersDB(pdb); setTeamsDB(tdb);
      setLeagueUsers((lg?.users || []).map(u => ({ id: u.id, name: u.name, players: (u.players || []).map(x => x.id) })));
    } catch(e){ /* silencioso: la pestaña mostrará el aviso */ }
  }, []);

  useEffect(() => { if(tab==="rivales" && !leagueUsers) loadRivalsData(); }, [tab]);

  // Cuando hay datos de rivales, encolar probabilidades de todos sus equipos
  useEffect(() => {
    if(!leagueUsers || !playersDB) return;
    const slugs = new Set();
    leagueUsers.forEach(u => u.players.forEach(pid => { const ff = playersDB[pid] && ffSlugForTeamId(playersDB[pid].teamID); if(ff) slugs.add(ff); }));
    enqueueProbs([...slugs]);
  }, [leagueUsers, playersDB, teamsDB]);

  // Devuelve {prob, estado, ffName} para un jugador del once, o null.
  const getPlayerProb = (p) => {
    const slug = ffSlugFor(p.team);
    const entry = slug && probsByTeam[slug];
    if(!entry || entry==="loading" || entry==="error") return entry || null;
    const hit = matchProb(p.name, entry.players);
    return hit ? { prob: hit.prob, estado: hit.estado, ffName: hit.name } : null;
  };

  // Datos enriquecidos de un jugador de plantilla rival (por id)
  const rivalPlayerInfo = (pid) => {
    const pl = playersDB?.[pid];
    if(!pl) return { name: `#${pid}`, prob: null };
    const ff = ffSlugForTeamId(pl.teamID);
    const entry = ff && probsByTeam[ff];
    const loading = entry === "loading";
    let prob = null, estado = null, nac = null;
    if(entry && typeof entry === "object"){
      const hit = matchProb(pl.name, entry.players);
      if(hit){ prob = hit.prob; estado = hit.estado; nac = hit.nac; }
      nac = nac || entry.flag;
    }
    return { name: pl.name, teamName: teamsDB[pl.teamID]?.name, position: pl.position, prob, estado, nac, loading };
  };

  // ─── DERIVED ────────────────────────────────────────────────────────────────
  const sortedMembers = Object.entries(balances)
    .map(([id,bal]) => ({
      id: Number(id),
      name: members[id]?.name || `User ${id}`,
      icon: members[id]?.icon || "",
      balance: bal,
      isOwn: Number(id)===OWN_USER_ID,
    }))
    .sort((a,b) => b.balance - a.balance);

  const boardDesc = [...board].reverse();

  const filteredBoard = filterUser==="all" ? boardDesc : boardDesc.filter(ev => {
    if(ev.type === "exchange"){
      const c = ev.content || {};
      const uid = Number(filterUser);
      return c.from?.id === uid || c.to?.id === uid;
    }
    return (Array.isArray(ev.content) ? ev.content : []).some(c =>
      c.from?.id === Number(filterUser) || c.to?.id === Number(filterUser)
    );
  });

  const pName = (c) => {
    const pid  = typeof c.player==="object" ? c.player?.id  : c.player;
    const pn   = typeof c.player==="object" ? c.player?.name : null;
    return pn || playerMap[pid]?.name || `#${pid}`;
  };

  const pPos = (c) => {
    const pid = typeof c.player==="object" ? c.player?.id : c.player;
    return playerMap[pid]?.position || null;
  };

  const pTeam = (c) => {
    const pid = typeof c.player==="object" ? c.player?.id : c.player;
    return playerMap[pid]?.team || null;
  };

  const posLabel = (p) => ({1:"POR",2:"DEF",3:"MC",4:"DEL"}[p] || "?");
  const posColor = (p) => ({1:"#38bdf8",2:"#4ade80",3:"#facc15",4:"#f97316"}[p] || "#94a3b8");

  const isCors = error && (error.includes("fetch")||error.includes("NetworkError")||error.includes("Failed"));

  // ─── RENDER ─────────────────────────────────────────────────────────────────
  return (
    <div style={S.app}>

      {/* HEADER */}
      <div style={S.header}>
        <div>
          <div style={S.logo}>Biwenger <span style={{color:"#f97316"}}>Intel</span></div>
          <div style={S.meta}>CAFELITOS MUNDIAL · Liga {LEAGUE_ID} · {Object.keys(members).length} managers · {board.length} eventos</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap",justifyContent:"flex-end"}}>
          {cacheInfo && !loading && (
            <span style={{...S.meta, fontSize:10, lineHeight:"1.4em"}}>
              {cacheInfo.newCount > 0
                ? `+${cacheInfo.newCount} nuevos · `
                : ""}
              {cacheInfo.count} eventos cacheados
              {cacheInfo.savedAt
                ? ` · guardado ${new Date(cacheInfo.savedAt).toLocaleTimeString("es-ES")}`
                : ""}
            </span>
          )}
          {lastUpdated && !loading && (
            <span style={S.meta}>actualizado {lastUpdated.toLocaleTimeString("es-ES")}</span>
          )}
          <button style={S.btn} onClick={() => loadAll(false)} disabled={loading}>
            {loading ? `⟳ ${loadStep||"Cargando..."}` : "↻ Actualizar"}
          </button>
          <button
            style={{...S.btn, background:"#64748b", fontSize:11}}
            onClick={() => loadAll(true)}
            disabled={loading}
            title="Borrar caché y recargar todo desde la API"
          >
            ⟳ Recarga completa
          </button>
        </div>
      </div>

      {/* TOKEN BAR */}
      <div style={S.tokenBar}>
        <span style={{fontSize:11,color:"#475569",letterSpacing:1,textTransform:"uppercase"}}>🔑 Token</span>
        <input
          style={S.tokenInput}
          value={token}
          onChange={e=>setToken(e.target.value)}
          placeholder="Bearer eyJ..."
        />
        <button
          style={{...S.btn, fontSize:11, padding:"5px 12px", background:"#14532d", borderColor:"#15803d", whiteSpace:"nowrap"}}
          title="Comprueba el mercado ahora y envía email si hay chollos"
          onClick={() => {
            fetch(`${SERVER_URL}/api-local/check-market`, { method:"POST" })
              .then(r => r.json())
              .then(() => alert("Check de mercado iniciado — mira la consola del servidor"))
              .catch(() => alert("Error: asegúrate de que el servidor está corriendo"));
          }}
        >
          📧 Test alerta
        </button>
      </div>

      {/* TABS */}
      <div style={S.tabBar}>
        {[["once","🏟️ Mi Once"],["rivales","👥 Rivales"],["balances","💰 Saldos"],["board","📋 Tablón"],["market","🏪 Mercado"],["players","⚽ Jugadores"],["stats","📊 Stats"]].map(([k,l])=>(
          <div key={k} style={{...S.tab, ...(tab===k?S.tabActive:{})}} onClick={()=>setTab(k)}>{l}</div>
        ))}
      </div>

      <div style={S.content}>
        {loading && <div style={S.loadBar}><div style={S.loadBarInner}/></div>}

        {/* CORS ERROR */}
        {error && (
          <div style={S.errorBox}>
            <div style={{fontWeight:600,color:"#dc2626",marginBottom:8}}>⚠ {error}</div>
            {isCors && (
              <div style={S.corsBox}>
                <strong style={{color:"#3b82f6"}}>🔒 Error CORS — Soluciones:</strong><br/><br/>
                <strong>① Extensión (más fácil):</strong> Instala <code style={S.code}>CORS Everywhere</code> en Firefox o <code style={S.code}>Allow CORS</code> en Chrome. Actívala y recarga.<br/><br/>
                <strong>② Servidor local:</strong> En la carpeta donde está este HTML:<br/>
                <code style={{...S.code,display:"block",margin:"6px 0",padding:"8px"}}>python -m http.server 8080</code>
                Luego abre <code style={S.code}>http://localhost:8080/biwenger-intel.html</code><br/><br/>
                <strong>③ Consola de Biwenger:</strong> Abre biwenger.as.com → F12 → Consola. El token ya está embebido.
              </div>
            )}
          </div>
        )}

        {/* ── TAB MI ONCE ── */}
        {tab==="once" && <>
          {!lineup && !loading && <div style={{color:"#64748b",padding:20}}>Sin alineación cargada — pulsa 🔄 actualizar.</div>}
          {lineup && (() => {
            const byPos = {1:[],2:[],3:[],4:[]};
            lineup.players.forEach(p => { (byPos[p.position] = byPos[p.position]||[]).push(p); });
            const capId = lineup.captain?.id, strId = lineup.striker?.id;
            const renderChip = (p) => {
              const pr = getPlayerProb(p);
              const isLoading = pr === "loading";
              const prob   = (pr && typeof pr==="object") ? pr.prob   : null;
              const estado = (pr && typeof pr==="object") ? pr.estado : null;
              const cc = (p.country||"").toUpperCase();
              return (
                <div key={p.id} style={S.pitchChip} title={`${p.name} · ${p.team?.name||""}`}>
                  <div style={S.pitchFlagWrap}>
                    <img src={`https://static.futbolfantasy.com/flags/svg/${cc}.svg`} style={S.pitchFlag}
                         onError={e=>{e.target.style.visibility="hidden";}}/>
                    {p.id===capId && <span style={S.capBadge}>C</span>}
                    {p.id===strId && p.id!==capId && <span style={{...S.capBadge,background:"#fb923c"}}>D</span>}
                  </div>
                  <div style={S.pitchName}>{p.name}</div>
                  <div style={{...S.pitchProb, background:probColor(prob)}}>
                    {isLoading ? "…" : prob!=null ? `${prob}%` : "—"}
                    {estado && estado!=="0" ? " ⚠" : ""}
                  </div>
                </div>
              );
            };
            return (
              <div style={S.pitchWrap}>
                <div style={S.pitchInner}>
                  {[4,3,2,1].map(pos => (byPos[pos]&&byPos[pos].length>0) ? (
                    <div key={pos} style={S.pitchRow}>{byPos[pos].map(renderChip)}</div>
                  ) : null)}
                </div>
                <div style={S.pitchLegend}>
                  Formación <strong>{lineup.type}</strong> · % = probabilidad de ser titular (futbolfantasy) · ⚠ duda/lesión · <span style={{color:"#facc15",fontWeight:700}}>C</span> capitán · <span style={{color:"#fb923c",fontWeight:700}}>D</span> delantero
                </div>
              </div>
            );
          })()}
        </>}

        {/* ── TAB RIVALES ── */}
        {tab==="rivales" && <>
          {!leagueUsers && <div style={{color:"#64748b",padding:20}}>Cargando plantillas de los managers y probabilidades…</div>}
          {leagueUsers && (() => {
            const cards = leagueUsers.map(u => {
              const players = u.players.map(rivalPlayerInfo).sort((a,b) => (b.prob??-1) - (a.prob??-1));
              const titulares = players.filter(p => p.prob!=null && p.prob>=60).length;
              return { id:u.id, name:u.name, players, titulares, total:players.length, isOwn:u.id===OWN_USER_ID };
            }).sort((a,b) => b.titulares - a.titulares);
            return (
              <>
                <div style={S.sectionTitle}>Plantillas rivales · {cards.length} managers · probabilidad de ser titular en su selección (futbolfantasy)</div>
                {cards.map(c => {
                  const open = expandedRival===c.id;
                  return (
                    <div key={c.id} style={{...S.card, marginBottom:10, padding:0, ...(c.isOwn?{border:"1px solid #fdba74"}:{})}}>
                      <div style={S.rivalHeader} onClick={()=>setExpandedRival(open?null:c.id)}>
                        <div style={{display:"flex",alignItems:"center",gap:10}}>
                          <div style={S.avatar}>{initials(c.name)}</div>
                          <span style={{fontWeight:700}}>{c.name}</span>
                          {c.isOwn && <span style={S.ownBadge}>TÚ</span>}
                        </div>
                        <div style={{display:"flex",alignItems:"center",gap:14}}>
                          <span style={{fontSize:13}}><strong style={{color:"#16a34a"}}>{c.titulares}</strong> <span style={{color:"#94a3b8"}}>titulares prob.</span></span>
                          <span style={{fontSize:12,color:"#94a3b8"}}>{c.total} jug.</span>
                          <span style={{fontSize:11,color:"#475569"}}>{open?"▲":"▼"}</span>
                        </div>
                      </div>
                      {open && (
                        <div style={{padding:"2px 12px 12px"}}>
                          {c.players.map((p,i)=>(
                            <div key={i} style={S.rivalRow}>
                              <img src={`https://static.futbolfantasy.com/flags/svg/${(p.nac||"").toUpperCase()}.svg`} style={S.rivalFlag} onError={e=>{e.target.style.visibility="hidden";}}/>
                              <span style={{flex:1,fontSize:13,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.name}</span>
                              {p.position!=null && <span style={{...S.posTag,background:posColor(p.position)+"22",color:posColor(p.position),border:`1px solid ${posColor(p.position)}44`}}>{posLabel(p.position)}</span>}
                              <span style={{fontSize:11,color:"#94a3b8",width:88,textAlign:"right",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.teamName||""}</span>
                              <span style={{...S.pitchProb,background:probColor(p.prob),minWidth:44}}>
                                {p.loading?"…":p.prob!=null?`${p.prob}%`:"—"}{p.estado&&p.estado!=="0"?" ⚠":""}
                              </span>
                            </div>
                          ))}
                        </div>
                      )}
                    </div>
                  );
                })}
              </>
            );
          })()}
        </>}

        {/* ── TAB SALDOS ── */}
        {tab==="balances" && <>
          <div style={S.statsGrid}>
            {[
              ["Managers en liga",    sortedMembers.length,                              "#94a3b8"],
              ["Tu saldo real (API)", ownBalance!=null ? fmt(ownBalance) : "—",          "#38bdf8"],
              ["Tu saldo estimado",   sortedMembers.find(m=>m.isOwn) ? fmt(sortedMembers.find(m=>m.isOwn).balance) : "—", "#60a5fa"],
              ["Δ Real vs Estimado",  (() => {
                const own = sortedMembers.find(m=>m.isOwn);
                if(!own || ownBalance==null) return "—";
                const d = ownBalance - own.balance;
                return `${d>=0?"+":""}${fmt(d)}`;
              })(), (() => {
                const own = sortedMembers.find(m=>m.isOwn);
                if(!own || ownBalance==null) return "#475569";
                return Math.abs(ownBalance - own.balance) < 100_000 ? "#4ade80" : "#f87171";
              })()],
              ["Saldo más alto rival", sortedMembers.filter(m=>!m.isOwn).length>0 ? fmt(Math.max(...sortedMembers.filter(m=>!m.isOwn).map(m=>m.balance))) : "—", "#4ade80"],
              ["Saldo más bajo rival", sortedMembers.filter(m=>!m.isOwn).length>0 ? fmt(Math.min(...sortedMembers.filter(m=>!m.isOwn).map(m=>m.balance))) : "—", "#f87171"],
            ].map(([l,v,c])=>(
              <div key={l} style={S.statCard}>
                <div style={S.statLabel}>{l}</div>
                <div style={{...S.statValue,color:c}}>{v}</div>
              </div>
            ))}
          </div>
          <div style={S.sectionTitle}>Clasificación por saldo estimado · {sortedMembers.length} managers</div>
          <div style={S.card}>
            <table style={S.table}>
              <thead>
                <tr>{["#","Manager","Saldo Est.","Saldo Real","Δ Real/Est","Estado","Δ vs 20M","Gastado","Ingresado"].map(h=>(
                  <th key={h} style={S.th}>{h}</th>
                ))}</tr>
              </thead>
              <tbody>
                {sortedMembers.length===0 && !loading && (
                  <tr><td colSpan={9} style={{textAlign:"center",color:"#475569",padding:40}}>
                    Sin datos — comprueba el token y la conexión
                  </td></tr>
                )}
                {sortedMembers.map((m,i) => {
                  let spent=0, earned=0;
                  for(const ev of board){
                    if(ev.type==="transfer"||ev.type==="adminTransfer") for(const c of (Array.isArray(ev.content) ? ev.content : [])){
                      if(c.to?.id  ===m.id) spent  += c.amount||0;  // to=comprador
                      if(c.from?.id===m.id) earned += c.amount||0;  // from=vendedor
                    }
                    if(ev.type==="market") for(const c of (Array.isArray(ev.content) ? ev.content : [])){
                      if(c.to?.id  ===m.id) spent  += c.amount||0;
                      if(c.from?.id===m.id) earned += c.amount||0;  // venta en mercado
                    }
                    if(ev.type==="exchange"){
                      const c = ev.content || {};
                      const amt=c.amount||0, reqAmt=c.requestedAmount||0;
                      if(c.from?.id===m.id){ spent += amt;    earned += reqAmt; }  // from paga amt, recibe reqAmt
                      if(c.to?.id  ===m.id){ spent += reqAmt; earned += amt;    }  // to paga reqAmt, recibe amt
                    }
                    if(ev.type==="bonus") for(const c of (Array.isArray(ev.content) ? ev.content : [])){
                      if(c.user?.id===m.id){ const a=c.amount||0; if(a>=0) earned+=a; else spent+=-a; }
                    }
                    if(ev.type==="roundFinished") for(const r of (ev.content?.results||[])){
                      if(r.user?.id===m.id) earned += r.bonus||0;  // premio de jornada
                    }
                  }
                  const delta      = m.balance - START_BUDGET;
                  const bc         = balClass(m.balance);
                  const realMBal   = m.isOwn ? ownBalance : (members[m.id]?.realBalance ?? null);
                  const diffReal   = realMBal != null ? realMBal - m.balance : null;
                  const diffColor  = diffReal == null ? "#475569"
                                   : Math.abs(diffReal) < 100_000 ? "#4ade80"
                                   : Math.abs(diffReal) < 500_000 ? "#facc15" : "#f87171";
                  const isExpanded = selectedMgr === m.id;

                  // Trazabilidad: todas las operaciones de este manager
                  const txs = !isExpanded ? [] : board.flatMap(ev => {
                    if(ev.type === "exchange"){
                      const c = ev.content || {};
                      if(c.from?.id!==m.id && c.to?.id!==m.id) return [];
                      const amt=c.amount||0, reqAmt=c.requestedAmount||0;
                      const isFrom = c.from?.id===m.id;
                      const pays   = isFrom ? amt    : reqAmt;  // efectivo que entrega m
                      const gets   = isFrom ? reqAmt : amt;     // efectivo que recibe m
                      const contra = (isFrom ? c.to?.name : c.from?.name) || "Intercambio";
                      const rows=[];
                      if(pays>0) rows.push({ date:ev.date, pname:"💵 Efectivo", pteam:null, amount:pays, isBuy:true,  contra, txType:"exchange" });
                      if(gets>0) rows.push({ date:ev.date, pname:"💵 Efectivo", pteam:null, amount:gets, isBuy:false, contra, txType:"exchange" });
                      return rows;
                    }
                    if(ev.type === "bonus"){
                      const rows=[];
                      for(const c of (Array.isArray(ev.content) ? ev.content : [])){
                        if(c.user?.id===m.id){ const a=c.amount||0; if(a!==0) rows.push({ date:ev.date, pname:"🎁 Bonus admin", pteam:null, amount:Math.abs(a), isBuy:a<0, contra:ev.author?.name||"Admin", txType:"bonus" }); }
                      }
                      return rows;
                    }
                    if(ev.type === "roundFinished"){
                      const r = (ev.content?.results||[]).find(x=>x.user?.id===m.id);
                      if(!r || !r.bonus) return [];
                      return [{ date:ev.date, pname:"🏆 Premio jornada", pteam:null, amount:r.bonus, isBuy:false, contra:ev.content?.round?.name||"Jornada", txType:"roundFinished" }];
                    }
                    if(ev.type !== "transfer" && ev.type !== "market" && ev.type !== "adminTransfer") return [];
                    return (Array.isArray(ev.content) ? ev.content : [])
                      .filter(c => c.from?.id===m.id || c.to?.id===m.id)
                      .map(c => {
                        // from=VENDEDOR (cobra), to=COMPRADOR (paga) — vale para market/transfer/adminTransfer
                        const isBuy  = c.to?.id===m.id;
                        const pid    = typeof c.player==="object" ? c.player?.id : c.player;
                        const pname  = typeof c.player==="object" ? c.player?.name : (playerMap[pid]?.name || `#${pid}`);
                        const pteam  = playerMap[pid]?.team || null;
                        const contra = isBuy
                          ? (c.from?.name || "Mercado libre")
                          : (c.to?.name   || "Mercado libre");
                        return { date: ev.date, pname, pteam, amount: c.amount||0, isBuy, contra, txType: ev.type };
                      });
                  }).sort((a,b)=>b.date-a.date);

                  // Balance running: procesar en orden cronológico (asc), mostrar desc
                  let runBal = START_BUDGET;
                  const txsWithBal = [...txs].reverse().map(tx => {
                    runBal += tx.isBuy ? -tx.amount : tx.amount;
                    return {...tx, balAfter: runBal};
                  }); // txsWithBal[last].balAfter ≈ m.balance

                  return (
                    <React.Fragment key={m.id}>
                      <tr
                        style={{...(m.isOwn?S.ownRow:{}), cursor:"pointer", userSelect:"none"}}
                        onClick={()=>setSelectedMgr(isExpanded ? null : m.id)}
                      >
                        <td style={{...S.td,...S.rankCell,color:i<3?"#f97316":"#475569"}}>{i+1}</td>
                        <td style={S.td}>
                          <div style={{display:"flex",alignItems:"center",gap:8}}>
                            <div style={{...S.avatar,background:isExpanded?"#f97316":"#fed7aa"}}>{initials(m.name)}</div>
                            <span>{m.name}</span>
                            {m.isOwn && <span style={S.ownBadge}>TÚ</span>}
                            <span style={{fontSize:10,color:"#475569"}}>{isExpanded?"▲":"▼"}</span>
                          </div>
                        </td>
                        <td style={{...S.td,...S.moneyCell,color:{rich:"#4ade80",mid:"#facc15",tight:"#f87171"}[bc]}}>
                          {fmt(m.balance)}
                        </td>
                        <td style={{...S.td,...S.moneyCell,color:"#f97316"}}>
                          {realMBal != null ? fmt(realMBal) : <span style={{color:"#cbd5e1"}}>—</span>}
                        </td>
                        <td style={{...S.td,...S.moneyCell,color:diffColor}}>
                          {diffReal == null ? <span style={{color:"#cbd5e1"}}>—</span>
                            : `${diffReal>=0?"+":""}${fmt(diffReal)}`}
                        </td>
                        <td style={S.td}>
                          <span style={{...S.badge,...S.badgeColors[bc]}}>{
                            bc==="rich"?"💰 Rico":bc==="mid"?"⚖️ Medio":"🔴 Apurado"
                          }</span>
                        </td>
                        <td style={{...S.td,...S.moneyCell,color:delta>=0?"#4ade80":"#f87171"}}>
                          {delta>=0?"+":""}{fmt(delta)}
                        </td>
                        <td style={{...S.td,...S.moneyCell,color:"#dc2626"}}>-{fmt(spent)}</td>
                        <td style={{...S.td,...S.moneyCell,color:"#16a34a"}}>+{fmt(earned)}</td>
                      </tr>
                      {isExpanded && (
                        <tr>
                          <td colSpan={9} style={{padding:0,background:"#f8fafc",borderBottom:"2px solid #f97316"}}>
                            <div style={{padding:"12px 20px"}}>
                              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                                <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:11,letterSpacing:2,textTransform:"uppercase",color:"#3b82f6"}}>
                                  Trazabilidad de {m.name} · {txs.length} operaciones
                                </span>
                                <span style={{fontSize:12,color:"#475569"}}>
                                  20.00M inicial → <span style={{color:{rich:"#4ade80",mid:"#facc15",tight:"#f87171"}[bc],fontWeight:700}}>{fmt(m.balance)}</span> estimado
                                  {realMBal!=null && <> · <span style={{color:"#f97316",fontWeight:700}}>{fmt(realMBal)}</span> real</>}
                                </span>
                              </div>
                              {txs.length===0 ? (
                                <div style={{color:"#475569",fontSize:13,padding:"8px 0"}}>Sin operaciones registradas en el tablón</div>
                              ) : (
                                <table style={{...S.table,fontSize:12}}>
                                  <thead>
                                    <tr>
                                      {["Fecha","Jugador","Tipo","Importe","Contrapartida","Saldo tras op."].map(h=>(
                                        <th key={h} style={{...S.th,fontSize:10,padding:"6px 10px"}}>{h}</th>
                                      ))}
                                    </tr>
                                  </thead>
                                  <tbody>
                                    {[...txsWithBal].reverse().map((tx,ti)=>(
                                      <tr key={ti} style={{borderBottom:"1px solid #0a1220"}}>
                                        <td style={{...S.td,padding:"6px 10px",color:"#475569",fontSize:11}}>{fmtDate(tx.date)}</td>
                                        <td style={{...S.td,padding:"6px 10px"}}>
                                          {tx.pname}
                                          {tx.pteam && <span style={{marginLeft:5,fontSize:10,color:"#64748b"}}>{tx.pteam}</span>}
                                        </td>
                                        <td style={{...S.td,padding:"6px 10px"}}>
                                          <span style={{padding:"2px 8px",borderRadius:3,fontSize:10,fontWeight:700,
                                            background:tx.isBuy?"#fee2e2":"#dcfce7",
                                            color:tx.isBuy?"#dc2626":"#16a34a"}}>
                                            {tx.isBuy ? "COMPRA" : "VENTA"}
                                          </span>
                                        </td>
                                        <td style={{...S.td,padding:"6px 10px",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,
                                          color:tx.isBuy?"#f87171":"#4ade80"}}>
                                          {tx.isBuy?"-":"+"}{fmtK(tx.amount)}
                                        </td>
                                        <td style={{...S.td,padding:"6px 10px",color:"#94a3b8"}}>{tx.contra}</td>
                                        <td style={{...S.td,padding:"6px 10px",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,color:"#1e293b"}}>
                                          {fmt(tx.balAfter)}
                                        </td>
                                      </tr>
                                    ))}
                                  </tbody>
                                </table>
                              )}
                            </div>
                          </td>
                        </tr>
                      )}
                    </React.Fragment>
                  );
                })}
              </tbody>
            </table>
          </div>
        </>}

        {/* ── TAB TABLÓN ── */}
        {tab==="board" && <>
          <div style={{display:"flex",alignItems:"center",gap:16,marginBottom:20}}>
            <div style={S.sectionTitle} className="notitle">Tablón de eventos</div>
            <select style={S.select} value={filterUser} onChange={e=>setFilterUser(e.target.value)}>
              <option value="all">Todos los managers</option>
              {sortedMembers.map(m=>(
                <option key={m.id} value={m.id}>{m.name}</option>
              ))}
            </select>
          </div>
          <div style={S.card}>
            {filteredBoard.length===0 && !loading && (
              <div style={{padding:32,textAlign:"center",color:"#475569"}}>Sin eventos</div>
            )}
            {filteredBoard.map((ev,idx)=>(
              <div key={idx} style={S.boardEvent}>
                <div style={S.eventHeader}>
                  <span style={{...S.evType,...(ev.type==="transfer"?S.evTransfer:ev.type==="market"?S.evMarket:ev.type==="exchange"?S.evExchange:S.evMove)}}>
                    {ev.type==="transfer"?"🔄 Traspaso":ev.type==="market"?"🏪 Mercado":ev.type==="exchange"?"🔀 Intercambio":"👟 Movimientos"}
                  </span>
                  <span style={{fontSize:12,color:"#475569"}}>{fmtDate(ev.date)}</span>
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:6}}>
                  {ev.type==="exchange" && (() => {
                    const c = ev.content || {};
                    const offeredNames  = (c.offeredPlayers  ||[]).map(id => playerMap[id]?.name || `#${id}`);
                    const requestedNames= (c.requestedPlayers||[]).map(id => playerMap[id]?.name || `#${id}`);
                    return (
                      <div style={S.eventItem}>
                        <span style={{fontSize:13,color:"#059669",fontWeight:600}}>{c.from?.name||"?"}</span>
                        <span style={{color:"#475569",fontSize:11}}>ofrece</span>
                        <span style={{color:"#64748b",fontSize:12}}>{offeredNames.join(", ")||"jugadores"}</span>
                        {c.amount > 0 && <><span style={{color:"#475569",fontSize:11}}>+</span><span style={{...S.money,color:"#059669"}}>{fmt(c.amount)}</span></>}
                        <span style={{color:"#475569",fontSize:14,fontWeight:700}}>⇄</span>
                        <span style={{fontSize:13,color:"#059669",fontWeight:600}}>{c.to?.name||"?"}</span>
                        <span style={{color:"#475569",fontSize:11}}>ofrece</span>
                        <span style={{color:"#64748b",fontSize:12}}>{requestedNames.join(", ")||"jugadores"}</span>
                        {c.requestedAmount > 0 && <><span style={{color:"#475569",fontSize:11}}>+</span><span style={{...S.money,color:"#059669"}}>{fmt(c.requestedAmount)}</span></>}
                      </div>
                    );
                  })()}
                  {ev.type!=="exchange" && (Array.isArray(ev.content) ? ev.content : []).slice(0,6).map((c,ci)=>{
                    const name = pName(c);
                    const pos  = pPos(c);
                    const team = pTeam(c);
                    if(ev.type==="transfer") return (
                      <div key={ci} style={S.eventItem}>
                        {pos && <span style={{...S.posTag,background:posColor(pos)+"22",color:posColor(pos),border:`1px solid ${posColor(pos)}44`}}>{posLabel(pos)}</span>}
                        <span style={S.playerTag}>⚽ {name}{team && <span style={{marginLeft:4,fontSize:10,color:"#94a3b8",fontWeight:400}}>{team}</span>}</span>
                        <span style={{...S.money,color:"#dc2626"}}>-{fmt(c.amount)}</span>
                        <span style={{color:"#475569",fontSize:11}}>←</span>
                        <span style={{fontSize:13,color:"#94a3b8"}}>{c.from?.name||"Mercado"}</span>
                        {c.to && <><span style={{color:"#475569",fontSize:11}}>→</span><span style={{fontSize:13,color:"#94a3b8"}}>{c.to.name}</span></>}
                        {c.type==="clause" && <span style={{fontSize:10,color:"#64748b"}}>(cláusula)</span>}
                      </div>
                    );
                    if(ev.type==="market") return (
                      <div key={ci} style={S.eventItem}>
                        {pos && <span style={{...S.posTag,background:posColor(pos)+"22",color:posColor(pos),border:`1px solid ${posColor(pos)}44`}}>{posLabel(pos)}</span>}
                        <span style={S.playerTag}>⚽ {name}{team && <span style={{marginLeft:4,fontSize:10,color:"#94a3b8",fontWeight:400}}>{team}</span>}</span>
                        <span style={{...S.money,color:"#dc2626"}}>-{fmt(c.amount)}</span>
                        <span style={{color:"#475569",fontSize:11}}>→</span>
                        <span style={{fontSize:13,color:"#94a3b8"}}>{c.to?.name||members[c.to?.id]?.name||`User ${c.to?.id}`}</span>
                      </div>
                    );
                    return (
                      <div key={ci} style={{...S.eventItem,color:"#64748b",fontSize:12}}>
                        {c.type==="join"?"➕":"➖"} Jugador #{typeof c.player==="object"?c.player?.id:c.player}
                      </div>
                    );
                  })}
                  {(Array.isArray(ev.content) ? ev.content : []).length>6 && <div style={{fontSize:12,color:"#475569"}}>+{(Array.isArray(ev.content)?ev.content:[]).length-6} más...</div>}
                </div>
              </div>
            ))}
          </div>
        </>}

        {/* ── TAB MERCADO ── */}
        {tab==="market" && <>
          <div style={S.sectionTitle}>Jugadores en venta ahora</div>
          {!marketData && !loading && <div style={{color:"#64748b",padding:20}}>Sin datos de mercado</div>}
          {marketData && (
            <>
              <div style={S.statsGrid}>
                <div style={S.statCard}>
                  <div style={S.statLabel}>Jugadores en venta</div>
                  <div style={S.statValue}>{(marketData.sales||[]).length}</div>
                </div>
                <div style={S.statCard}>
                  <div style={S.statLabel}>Tu saldo</div>
                  <div style={{...S.statValue,color:"#f97316"}}>{fmt(ownBalance)}</div>
                </div>
              </div>
              <div style={S.card}>
                <table style={S.table}>
                  <thead>
                    <tr>{["Jugador","Pos","Precio venta","Precio mercado","Vendedor","Expira","¿Comprable?"].map(h=>(
                      <th key={h} style={S.th}>{h}</th>
                    ))}</tr>
                  </thead>
                  <tbody>
                    {(marketData.sales||[]).map((s,i)=>{
                      const pid       = s.player?.id || s.player;
                      const pn        = s.player?.name || playerMap[pid]?.name || `#${pid}`;
                      const pos       = s.player?.position || playerMap[pid]?.position;
                      const team      = playerMap[pid]?.team || null;
                      const mktPrice  = s.player?.price || playerMap[pid]?.price;
                      const canBuy    = ownBalance != null && s.price <= ownBalance;
                      const expires   = s.until ? fmtDate(s.until) : "—";
                      const seller    = s.user ? (members[s.user]?.name || `User ${s.user}`) : "Mercado";
                      return (
                        <tr key={i}>
                          <td style={S.td}>
                            {pos && <span style={{...S.posTag,background:posColor(pos)+"22",color:posColor(pos),border:`1px solid ${posColor(pos)}44`,marginRight:6}}>{posLabel(pos)}</span>}
                            {pn}
                            {team && <span style={{marginLeft:5,fontSize:10,color:"#64748b"}}>{team}</span>}
                          </td>
                          <td style={{...S.td,color:"#94a3b8"}}>{pos?posLabel(pos):"—"}</td>
                          <td style={{...S.td,...S.moneyCell,color:"#d97706"}}>{fmt(s.price)}</td>
                          <td style={{...S.td,...S.moneyCell,color:"#64748b"}}>{mktPrice?fmt(mktPrice):"—"}</td>
                          <td style={{...S.td,fontSize:13,color:"#94a3b8"}}>{seller}</td>
                          <td style={{...S.td,fontSize:12,color:"#64748b"}}>{expires}</td>
                          <td style={S.td}>
                            <span style={{padding:"3px 10px",borderRadius:4,fontSize:11,fontWeight:700,
                              background:canBuy?"#dcfce7":"#fee2e2",
                              color:canBuy?"#16a34a":"#dc2626"}}>
                              {canBuy?"✓ Sí":"✗ No"}
                            </span>
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </>
          )}
        </>}

        {/* ── TAB JUGADORES ── */}
        {tab==="players" && <>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <div style={S.sectionTitle}>{Object.keys(playerMap).length} jugadores mapeados</div>
          </div>
          <div style={{...S.corsBox,marginBottom:20}}>
            <strong style={{color:"#3b82f6"}}>🔍 Estado del mapeo de jugadores</strong><br/><br/>
            <strong>Fuentes probadas:</strong><br/>
            {playerEndpoints.map((ep,i)=>(
              <div key={i} style={{fontSize:12,marginTop:4}}>
                <code style={S.code}>{ep}</code>
              </div>
            ))}<br/>
            <strong>Resultado:</strong> {Object.keys(playerMap).length} jugadores con nombre.<br/>
            <strong>IDs sin nombre:</strong> Se verán como <code style={S.code}>#ID</code> en el tablón.<br/><br/>
            <strong>💡 Siguiente paso:</strong> Con los IDs del tablón podemos buscar en SofaScore/FBref.
            Endpoint a investigar: <code style={S.code}>GET /api/v2/players/[ID]</code> (ejecutar desde la consola de biwenger.as.com)
          </div>
          <div style={S.card}>
            <table style={S.table}>
              <thead>
                <tr>{["ID","Nombre","Posición","Precio mercado"].map(h=><th key={h} style={S.th}>{h}</th>)}</tr>
              </thead>
              <tbody>
                {Object.entries(playerMap).sort((a,b)=>(a[1].name||"").localeCompare(b[1].name||"")).map(([id,p])=>(
                  <tr key={id}>
                    <td style={{...S.td,color:"#475569",fontFamily:"monospace",fontSize:12}}>{id}</td>
                    <td style={S.td}>{p.name}</td>
                    <td style={S.td}>
                      {p.position && <span style={{...S.posTag,background:posColor(p.position)+"22",color:posColor(p.position),border:`1px solid ${posColor(p.position)}44`}}>{posLabel(p.position)}</span>}
                    </td>
                    <td style={{...S.td,...S.moneyCell,color:"#94a3b8"}}>{p.price?fmt(p.price):"—"}</td>
                  </tr>
                ))}
                {Object.keys(playerMap).length===0 && (
                  <tr><td colSpan={4} style={{textAlign:"center",color:"#475569",padding:32}}>
                    Sin jugadores mapeados aún — los IDs del tablón sin nombre se mostrarán cuando actualices
                  </td></tr>
                )}
              </tbody>
            </table>
          </div>
        </>}

        {/* ── TAB STATS ── */}
        {tab==="stats" && <>
          <div style={S.sectionTitle}>Resumen de actividad de mercado</div>
          <div style={S.statsGrid}>
            {[
              ["🔄 Traspasos",         board.filter(e=>e.type==="transfer").length],
              ["🔀 Intercambios",      board.filter(e=>e.type==="exchange").length],
              ["🏪 Compras mercado",   board.filter(e=>e.type==="market").length],
              ["👟 Mov. plantilla",    board.filter(e=>e.type==="playerMovements").length],
              ["⚽ Jugadores únicos",  Object.keys(playerMap).length],
              ["💸 Total transacciones", (() => {
                let t=0;
                for(const ev of board){
                  if(ev.type==="transfer"||ev.type==="market")
                    for(const c of (Array.isArray(ev.content) ? ev.content : [])) t+=c.amount||0;
                  else if(ev.type==="exchange"){
                    const c = ev.content || {};
                    t += (c.amount||0) + (c.requestedAmount||0);
                  }
                }
                return fmt(t);
              })()],
            ].map(([l,v])=>(
              <div key={l} style={S.statCard}>
                <div style={S.statLabel}>{l}</div>
                <div style={S.statValue}>{v}</div>
              </div>
            ))}
          </div>

          <div style={S.sectionTitle}>Ranking actividad en mercado</div>
          <div style={S.card}>
            <table style={S.table}>
              <thead>
                <tr>{["Manager","Compras realizadas","Total gastado","Total ingresado","Saldo neto"].map(h=><th key={h} style={S.th}>{h}</th>)}</tr>
              </thead>
              <tbody>
                {sortedMembers.map(m=>{
                  let spent=0, earned=0, ops=0;
                  for(const ev of board){
                    if(ev.type==="transfer"||ev.type==="adminTransfer") for(const c of (Array.isArray(ev.content) ? ev.content : [])){
                      if(c.to?.id  ===m.id){spent +=c.amount||0;ops++;}  // to=comprador
                      if(c.from?.id===m.id) earned+=c.amount||0;          // from=vendedor
                    }
                    if(ev.type==="market") for(const c of (Array.isArray(ev.content) ? ev.content : [])){
                      if(c.to?.id  ===m.id){spent +=c.amount||0;ops++;}
                      if(c.from?.id===m.id) earned+=c.amount||0;  // venta en mercado
                    }
                    if(ev.type==="exchange"){
                      const c = ev.content || {};
                      const amt=c.amount||0, reqAmt=c.requestedAmount||0;
                      if(c.from?.id===m.id){ spent+=amt;    earned+=reqAmt; ops++; }
                      if(c.to?.id  ===m.id){ spent+=reqAmt; earned+=amt;    ops++; }
                    }
                    if(ev.type==="bonus") for(const c of (Array.isArray(ev.content) ? ev.content : [])){
                      if(c.user?.id===m.id){ const a=c.amount||0; if(a>=0) earned+=a; else spent+=-a; }
                    }
                    if(ev.type==="roundFinished") for(const r of (ev.content?.results||[])){
                      if(r.user?.id===m.id) earned+=r.bonus||0;  // premio de jornada
                    }
                  }
                  const net = earned - spent;
                  return (
                    <tr key={m.id} style={m.isOwn?S.ownRow:{}}>
                      <td style={S.td}>
                        <div style={{display:"flex",alignItems:"center",gap:8}}>
                          <div style={S.avatar}>{initials(m.name)}</div>
                          {m.name}
                          {m.isOwn && <span style={S.ownBadge}>TÚ</span>}
                        </div>
                      </td>
                      <td style={{...S.td,textAlign:"center"}}>{ops}</td>
                      <td style={{...S.td,...S.moneyCell,color:"#dc2626"}}>-{fmt(spent)}</td>
                      <td style={{...S.td,...S.moneyCell,color:"#16a34a"}}>+{fmt(earned)}</td>
                      <td style={{...S.td,...S.moneyCell,color:net>=0?"#4ade80":"#f87171"}}>{net>=0?"+":""}{fmt(net)}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </>}
      </div>
    </div>
  );
}

// ─── STYLES ──────────────────────────────────────────────────────────────────

  app:         { fontFamily:"'Barlow',sans-serif", background:"#f8fafc", color:"#1e293b", minHeight:"100vh" },

  btn:         { background:"#f97316", color:"#fff", border:"none", padding:"9px 16px", borderRadius:8, cursor:"pointer", fontFamily:"'Barlow',sans-serif", fontSize:13, fontWeight:600, minHeight:38, touchAction:"manipulation" },

  tabActive:   { color:"#f97316", borderBottomColor:"#f97316" },
  content:     { padding:16 },
  // ── Pestaña Mi Once (campo) ──
  pitchWrap:   { display:"flex", flexDirection:"column", alignItems:"center", gap:12 },
  pitchInner:  { width:"100%", maxWidth:440, aspectRatio:"5 / 7", backgroundImage:"url('campo.jpg')", backgroundSize:"cover", backgroundPosition:"center", borderRadius:14, boxShadow:"0 6px 22px rgba(0,0,0,.22)", display:"flex", flexDirection:"column", justifyContent:"space-around", padding:"20px 6px" },
  pitchRow:    { display:"flex", justifyContent:"space-around", alignItems:"flex-start" },
  pitchChip:   { display:"flex", flexDirection:"column", alignItems:"center", gap:3, width:66 },
  pitchFlagWrap:{ position:"relative", lineHeight:0 },
  pitchFlag:   { width:36, height:36, borderRadius:"50%", objectFit:"cover", border:"2px solid #fff", boxShadow:"0 1px 5px rgba(0,0,0,.5)", background:"#e2e8f0" },
  capBadge:    { position:"absolute", top:-5, right:-7, background:"#facc15", color:"#1e293b", fontSize:9, fontWeight:800, borderRadius:"50%", width:16, height:16, display:"flex", alignItems:"center", justifyContent:"center", border:"1.5px solid #fff" },
  pitchName:   { fontSize:11, fontWeight:700, color:"#fff", textShadow:"0 1px 3px rgba(0,0,0,.95)", textAlign:"center", lineHeight:1.05, maxWidth:72, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" },
  pitchProb:   { fontSize:11, fontWeight:800, color:"#fff", borderRadius:8, padding:"1px 8px", textShadow:"0 1px 2px rgba(0,0,0,.45)", minWidth:34, textAlign:"center" },
  pitchLegend: { fontSize:11, color:"#64748b", textAlign:"center", maxWidth:440, lineHeight:1.5 },
  // ── Pestaña Rivales ──
  rivalHeader: { display:"flex", justifyContent:"space-between", alignItems:"center", padding:"12px 14px", cursor:"pointer", userSelect:"none" },
  rivalRow:    { display:"flex", alignItems:"center", gap:8, padding:"5px 0", borderBottom:"1px solid #f1f5f9" },
  rivalFlag:   { width:22, height:22, borderRadius:"50%", objectFit:"cover", border:"1px solid #e2e8f0", background:"#e2e8f0", flexShrink:0 },
  loadBar:     { height:3, background:"#fed7aa", borderRadius:3, overflow:"hidden", marginBottom:20 },
  loadBarInner:{ height:"100%", width:"40%", background:"linear-gradient(90deg,#f97316,#fb923c)", animation:"slide 1s ease-in-out infinite", borderRadius:3 },
  errorBox:    { background:"#fef2f2", border:"1px solid #fecaca", borderRadius:10, padding:14, marginBottom:14 },
  corsBox:     { background:"#eff6ff", border:"1px solid #bfdbfe", borderRadius:10, padding:14, color:"#1d4ed8", fontSize:13, lineHeight:1.8, marginBottom:14 },
