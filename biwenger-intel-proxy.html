<script src="https://unpkg.com/react@18/umd/react.development.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&display=swap');

<body>
<div id="root"></div>
<!--
  IMPORTANTE: usamos type="text/babel-app" (NO "text/babel") a propósito.
  Babel-standalone auto-transforma TODOS los <script type="text/babel"> de la
  página, incluidos los que inyectan extensiones del navegador / VPN. Si uno de
  esos scripts ajenos falla (p.ej. un `import` suelto), la pasada entera aborta y
  NUESTRA app nunca se monta → pantalla en blanco. Para aislarnos, marcamos el
  script con un tipo que Babel ignora y lo compilamos nosotros mismos abajo,
  dentro de un try/catch, de forma que nada externo pueda tumbar la app.
-->
<script type="text/babel-app" id="app-src">
const { useState, useEffect, useCallback, useRef } = React;

// ─── CONFIG ─────────────────────────────────────────────────────────────────
const LEAGUE_ID    = 2057487;
const OWN_USER_ID  = 13532644;
const START_BUDGET = 20_000_000;

// ─── SERVER URL (auto-detectado) ─────────────────────────────────────────────
// En local (localhost) usa rutas relativas → va al server.js local.
// En GitHub Pages usa la URL de Render → va al servidor en la nube.
const RENDER_URL = "https://biwenger-worldcup.onrender.com";
const SERVER_URL = (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1")
  ? ""
  : RENDER_URL;

// ─── HELPERS ─────────────────────────────────────────────────────────────────
const fmt  = n => n==null ? "—" : `${(n/1_000_000).toFixed(2)}M`;
const fmtK = n => n==null ? "—" : n>=1_000_000 ? `${(n/1_000_000).toFixed(2)}M` : n>=1000 ? `${(n/1000).toFixed(0)}K` : String(n);
const fmtDate = ts => new Date(ts*1000).toLocaleDateString("es-ES",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"});
const initials = name => (name||"??").split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();
const balClass = b => b>15_000_000?"rich":b>5_000_000?"mid":"tight";

const LOCK = "🔒";

// ─── SESIÓN (login) ──────────────────────────────────────────────────────────
const SESSION_KEY = "biw_session_v1";

const sessionLoad = () => {
  try {
    const raw = localStorage.getItem(SESSION_KEY);
    if (!raw) return null;
    const s = JSON.parse(raw);
    return s?.session && s?.role ? s : null;
  } catch(e){ return null; }
};
const sessionSave  = (s) => { try { localStorage.setItem(SESSION_KEY, JSON.stringify(s)); } catch(e){} };
const sessionClear = () => { try { localStorage.removeItem(SESSION_KEY); } catch(e){} };

// ─── CACHE (localStorage) — separada por rol para no filtrar datos del owner ──
const cacheKey = (role) => `biw_dashboard_${LEAGUE_ID}_${role}`;
const cacheSave = (role, data) => {
  try { localStorage.setItem(cacheKey(role), JSON.stringify({ ...data, savedAt: Date.now() })); }
  catch(e){ console.warn("Cache write failed:", e); }
};
const cacheLoad = (role) => {
  try {
    const raw = localStorage.getItem(cacheKey(role));
    return raw ? JSON.parse(raw) : null;
  } catch(e){ return null; }
};
const cacheClearAll = () => {
  try {
    localStorage.removeItem(cacheKey("owner"));
    localStorage.removeItem(cacheKey("guest"));
  } catch(e){}
};

// ─────────────────────────────────────────────────────────────────────────────
// LOGIN SCREEN — temática Mundial, ilustración CSS/SVG
// ─────────────────────────────────────────────────────────────────────────────
function LoginScreen({ onLogin }) {
  const [password, setPassword] = useState("");
  const [loading, setLoading]   = useState(false);
  const [error, setError]       = useState(null);

  const submit = async (e) => {
    e?.preventDefault();
    if (!password) return;
    setLoading(true);
    setError(null);
    try {
      const res = await fetch(`${SERVER_URL}/api/login`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ password }),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        setError(data.error || "Contraseña incorrecta");
        setLoading(false);
        return;
      }
      const sess = { role: data.role, session: data.session };
      sessionSave(sess);
      cacheClearAll(); // empezamos limpio en cada login
      onLogin(sess);
    } catch(err) {
      setError("No se pudo conectar con el servidor. Inténtalo de nuevo.");
      setLoading(false);
    }
  };

  return (
    <div style={LS.wrap}>
      {/* Fondo animado */}
      <div style={LS.bg}/>
      <div style={LS.glow}/>

      {/* Confeti / balones flotantes */}
      {Array.from({length:9}).map((_,i)=>(
        <div key={i} className={`floatBall fb${i}`} style={LS.ball}>⚽</div>
      ))}
      <div className="floatBall fbT" style={{...LS.ball, fontSize:46}}>🏆</div>

      {/* Tarjeta glassmorphism */}
      <form onSubmit={submit} style={LS.card}>
        <div style={LS.trophyRing}>
          <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
            <circle cx="32" cy="32" r="30" stroke="#f97316" strokeWidth="2.5" opacity="0.4"/>
            <path d="M20 16h24v6a12 12 0 0 1-24 0v-6Z" fill="#facc15"/>
            <path d="M20 16h-6v4a8 8 0 0 0 8 8" stroke="#f59e0b" strokeWidth="3" strokeLinecap="round"/>
            <path d="M44 16h6v4a8 8 0 0 1-8 8" stroke="#f59e0b" strokeWidth="3" strokeLinecap="round"/>
            <rect x="28" y="34" width="8" height="10" fill="#f59e0b"/>
            <rect x="22" y="44" width="20" height="5" rx="2" fill="#d97706"/>
            <rect x="25" y="49" width="14" height="4" rx="2" fill="#b45309"/>
          </svg>
        </div>

        <div style={LS.kicker}>CAFELITOS MUNDIAL</div>
        <div style={LS.title}>Biwenger <span style={{color:"#f97316"}}>Intel</span></div>
        <div style={LS.sub}>Inteligencia de mercado · World Cup Fantasy</div>

        <div style={LS.field}>
          <span style={LS.fieldIcon}>🔑</span>
          <input
            type="password"
            value={password}
            onChange={e=>{setPassword(e.target.value); setError(null);}}
            placeholder="Introduce la contraseña"
            style={LS.input}
            autoFocus
          />
        </div>

        {error && <div style={LS.error}>⚠ {error}</div>}

        <button type="submit" style={{...LS.btn, opacity:loading?0.7:1}} disabled={loading}>
          {loading ? "Entrando..." : "Entrar"}
        </button>

        <div style={LS.foot}>
          🔒 Acceso protegido · Tus datos viajan cifrados
        </div>
      </form>

      <div style={LS.credit}>⚽ Solo para el grupo de amigos · CAFELITOS MUNDIAL</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// KICKED SCREEN — invitado expulsado tras el show de 5 s
// ─────────────────────────────────────────────────────────────────────────────
function KickedScreen({ onBack }) {
  return (
    <div style={LS.wrap}>
      <div style={LS.bg}/>
      <div style={LS.glow}/>
      {Array.from({length:6}).map((_,i)=>(
        <div key={i} className={`floatBall fb${i}`} style={LS.ball}>⚽</div>
      ))}
      <div className="floatBall fbT" style={{...LS.ball, fontSize:46}}>🏆</div>

      <div style={LS.card}>
        <div style={{fontSize:54, marginBottom:6}}>⏱️</div>
        <div style={LS.title}>¡Se acabó <span style={{color:"#f97316"}}>el tiempo!</span></div>
        <div style={{...LS.sub, marginBottom:18}}>Los 5 segundos de cortesía han volado ⚡</div>

        <div style={LS.kickedBox}>
          🤝 ¿Quieres ver los saldos durante <b>más tiempo</b>?<br/>
          Tendrás que <b>ficharle algo a GabiPRIME</b> 😏⚽
        </div>

        <button style={LS.btn} onClick={onBack}>Volver a entrar</button>
        <div style={LS.foot}>🔒 El saldo de GabiPRO sigue protegido</div>
      </div>

      <div style={LS.credit}>⚽ CAFELITOS MUNDIAL · GabiPRIME™</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// MAIN APP
// ─────────────────────────────────────────────────────────────────────────────
function App({ session, onLogout }) {
  const isGuest     = session.role === "guest";
  const authHeaders = { "X-Biw-Session": session.session };

  const [tab, setTab]               = useState("balances");
  const [loading, setLoading]       = useState(false);
  const [loadStep, setLoadStep]     = useState("");
  const [error, setError]           = useState(null);
  const [ownBalance, setOwnBalance] = useState(null);
  const [members, setMembers]       = useState({});
  const [playerMap, setPlayerMap]   = useState({});
  const [board, setBoard]           = useState([]);
  const [balances, setBalances]     = useState({});
  const [marketData, setMarketData] = useState(null);
  const [lastUpdated, setLastUpdated] = useState(null);
  const [filterUser, setFilterUser] = useState("all");
  const [selectedMgr, setSelectedMgr] = useState(null);
  const [revealedSet, setRevealedSet] = useState(() => new Set()); // invitado: saldos revelados (show aleatorio)
  const [kicked, setKicked]           = useState(false);  // invitado: expulsado tras el show
  const [timeLeft, setTimeLeft]       = useState(5);      // invitado: cuenta atrás (s)
  const showStarted = useRef(false);
  const [tokenInput, setTokenInput]   = useState("");     // owner: panel token
  const [tokenMsg, setTokenMsg]       = useState("");

  const SHOW_MS = 5000; // duración del show de saldos en modo invitado

  // ── Aplicar un payload de dashboard al estado ──
  const applyData = (d) => {
    if (!d) return;
    setBoard(Array.isArray(d.board) ? d.board : []);
    setMembers(d.members || {});
    setPlayerMap(d.playerMap || {});
    setBalances(d.balances || {});
    setMarketData(d.marketData || null);
    setOwnBalance(d.ownBalance ?? null);
  };

  // ── MAIN LOAD: una sola llamada a /api/dashboard ──
  const loadAll = useCallback(async (forceRefresh = false) => {
    setLoading(true);
    setError(null);
    try {
      // Pintar caché del rol al instante
      if (!forceRefresh) {
        const cached = cacheLoad(session.role);
        if (cached) { applyData(cached); setLastUpdated(new Date(cached.savedAt || Date.now())); }
      }

      setLoadStep("Cargando datos...");
      const qs  = (forceRefresh && !isGuest) ? "?refresh=1" : "";
      const res = await fetch(`${SERVER_URL}/api/dashboard${qs}`, { headers: authHeaders });

      if (res.status === 401) { sessionClear(); cacheClearAll(); onLogout(); return; }

      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        setError(data.error || `Error ${res.status}`);
        setLoading(false);
        return;
      }

      applyData(data);
      cacheSave(session.role, data);
      setLastUpdated(new Date());
      setLoadStep("");
    } catch(e) {
      setError("No se pudo conectar con el servidor. " + (e.message || ""));
    } finally {
      setLoading(false);
    }
  }, []);

  useEffect(() => { loadAll(); }, []);

  // ── Invitado: show de saldos al azar durante SHOW_MS, luego expulsa ──
  useEffect(() => {
    if (!isGuest || showStarted.current) return;
    // ids de rivales con saldo visible (el del owner viene null del servidor)
    const ids = Object.keys(balances)
      .map(Number)
      .filter(id => id !== OWN_USER_ID && balances[id] != null);
    if (ids.length === 0) return; // esperar a que carguen los datos
    showStarted.current = true;

    // Orden aleatorio
    const shuffled = [...ids].sort(() => Math.random() - 0.5);
    const per = Math.max(250, Math.floor(SHOW_MS / shuffled.length));
    const timers = [];
    shuffled.forEach((id, i) => {
      timers.push(setTimeout(() => {
        setRevealedSet(prev => { const n = new Set(prev); n.add(id); return n; });
      }, Math.min(SHOW_MS - 300, i * per)));
    });

    // Cuenta atrás visible
    let t = Math.round(SHOW_MS / 1000);
    setTimeLeft(t);
    const cd = setInterval(() => { t -= 1; setTimeLeft(Math.max(0, t)); }, 1000);

    // Expulsión al terminar
    const ko = setTimeout(() => {
      clearInterval(cd);
      sessionClear();
      cacheClearAll();
      setKicked(true);
    }, SHOW_MS);

    return () => { timers.forEach(clearTimeout); clearInterval(cd); clearTimeout(ko); };
  }, [isGuest, balances]);

  // ── Owner: actualizar token de Biwenger en el servidor ──
  const saveToken = async () => {
    const t = tokenInput.trim();
    if (!t) return;
    setTokenMsg("Guardando...");
    try {
      const res = await fetch(`${SERVER_URL}/api-local/token`, {
        method: "POST",
        headers: { "Content-Type": "application/json", ...authHeaders },
        body: JSON.stringify({ token: t }),
      });
      if (res.status === 401) { sessionClear(); cacheClearAll(); onLogout(); return; }
      if (!res.ok) { setTokenMsg("❌ Error al guardar"); return; }
      setTokenMsg("✅ Token guardado");
      setTokenInput("");
      setTimeout(() => loadAll(true), 400);
      setTimeout(() => setTokenMsg(""), 3000);
    } catch(e) {
      setTokenMsg("❌ Sin conexión");
    }
  };

  const logout = () => { sessionClear(); cacheClearAll(); onLogout(); };

  // ─── DERIVED ────────────────────────────────────────────────────────────────
  // ¿Puede el rol actual ver el saldo de este manager?
  const isOwnerId = (id) => Number(id) === OWN_USER_ID;
  const canSee    = (id) => !isGuest ? true : (!isOwnerId(id) && revealedSet.has(Number(id)));

  const sortedMembers = Object.entries(balances)
    .map(([id,bal]) => ({
      id: Number(id),
      name: members[id]?.name || `User ${id}`,
      icon: members[id]?.icon || "",
      balance: bal,
      isOwn: Number(id)===OWN_USER_ID,
    }))
    .sort((a,b) => (b.balance ?? -Infinity) - (a.balance ?? -Infinity));

  // Lista de managers seleccionables por el invitado (sin el owner)
  const revealableMembers = sortedMembers.filter(m => !m.isOwn);

  const boardDesc = [...board].reverse();

  const filteredBoard = filterUser==="all" ? boardDesc : boardDesc.filter(ev => {
    if(ev.type === "exchange"){
      const c = ev.content || {};
      const uid = Number(filterUser);
      return c.from?.id === uid || c.to?.id === uid;
    }
    return (Array.isArray(ev.content) ? ev.content : []).some(c =>
      c.from?.id === Number(filterUser) || c.to?.id === Number(filterUser)
    );
  });

  const pName = (c) => {
    const pid  = typeof c.player==="object" ? c.player?.id  : c.player;
    const pn   = typeof c.player==="object" ? c.player?.name : null;
    return pn || playerMap[pid]?.name || `#${pid}`;
  };
  const pPos = (c) => {
    const pid = typeof c.player==="object" ? c.player?.id : c.player;
    return playerMap[pid]?.position || null;
  };
  const pTeam = (c) => {
    const pid = typeof c.player==="object" ? c.player?.id : c.player;
    return playerMap[pid]?.team || null;
  };
  const posLabel = (p) => ({1:"POR",2:"DEF",3:"MC",4:"DEL"}[p] || "?");
  const posColor = (p) => ({1:"#38bdf8",2:"#4ade80",3:"#facc15",4:"#f97316"}[p] || "#94a3b8");

  // Render de un importe en el tablón respetando el enmascarado del servidor
  const moneyOrLock = (val, hidden, color, sign="") => {
    if (hidden || val == null) return <span style={{color:"#cbd5e1"}}>{LOCK}</span>;
    return <span style={{...S.money, color}}>{sign}{fmt(val)}</span>;
  };

  // ─── Invitado expulsado tras el show ────────────────────────────────────────
  if (isGuest && kicked) {
    return <KickedScreen onBack={() => { sessionClear(); cacheClearAll(); onLogout(); }} />;
  }

  // ─── RENDER ─────────────────────────────────────────────────────────────────
  return (
    <div style={S.app}>

      {/* HEADER */}
      <div style={S.header}>
        <div>
          <div style={S.logo}>Biwenger <span style={{color:"#f97316"}}>Intel</span></div>
          <div style={S.meta}>CAFELITOS MUNDIAL · Liga {LEAGUE_ID} · {Object.keys(members).length} managers · {board.length} eventos</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap",justifyContent:"flex-end"}}>
          <span style={isGuest ? S.roleGuest : S.roleOwner}>
            {isGuest ? "👥 Invitado" : "👑 Admin"}
          </span>
          {lastUpdated && !loading && (
            <span style={S.meta}>actualizado {lastUpdated.toLocaleTimeString("es-ES")}</span>
          )}
          <button style={S.btn} onClick={() => loadAll(!isGuest)} disabled={loading}>
            {loading ? `⟳ ${loadStep||"Cargando..."}` : "↻ Actualizar"}
          </button>
          <button style={{...S.btn, background:"#64748b", fontSize:11}} onClick={logout} title="Cerrar sesión">
            ⎋ Salir
          </button>
        </div>
      </div>

      {/* ADMIN BAR (solo owner) */}
      {!isGuest && (
        <div style={S.tokenBar}>
          <span style={{fontSize:11,color:"#475569",letterSpacing:1,textTransform:"uppercase",whiteSpace:"nowrap"}}>🔑 Token API</span>
          <input
            style={S.tokenInput}
            value={tokenInput}
            onChange={e=>setTokenInput(e.target.value)}
            placeholder="Pega aquí un Bearer eyJ... nuevo para rotarlo (nunca se muestra)"
            type="password"
          />
          <button
            style={{...S.btn, fontSize:11, padding:"7px 12px", whiteSpace:"nowrap"}}
            onClick={saveToken}
          >
            Guardar token
          </button>
          {tokenMsg && <span style={{fontSize:11,color:"#475569",whiteSpace:"nowrap"}}>{tokenMsg}</span>}
          <button
            style={{...S.btn, fontSize:11, padding:"7px 12px", background:"#14532d", whiteSpace:"nowrap"}}
            title="Comprueba el mercado ahora y envía email si hay chollos"
            onClick={() => {
              fetch(`${SERVER_URL}/api-local/check-market`, { method:"POST", headers: authHeaders })
                .then(r => r.json())
                .then(() => alert("Check de mercado iniciado — mira la consola del servidor"))
                .catch(() => alert("Error: asegúrate de que el servidor está corriendo"));
            }}
          >
            📧 Test alerta
          </button>
        </div>
      )}

      {/* Aviso invitado */}
      {isGuest && (
        <div style={S.guestBar}>
          🎲 Modo invitado — los saldos se revelan al azar durante <b>5 segundos</b> y luego se cierra la sesión.
          El saldo de <b>GabiPRO</b> está protegido. ¿Quieres más tiempo? Fíchale algo a <b>GabiPRIME</b> 😏
        </div>
      )}

      {/* TABS */}
      <div style={S.tabBar}>
        {[["balances","💰 Saldos"],["board","📋 Tablón"],["market","🏪 Mercado"],["players","⚽ Jugadores"],["stats","📊 Stats"]].map(([k,l])=>(
          <div key={k} style={{...S.tab, ...(tab===k?S.tabActive:{})}} onClick={()=>setTab(k)}>{l}</div>
        ))}
      </div>

      <div style={S.content}>
        {loading && <div style={S.loadBar}><div style={S.loadBarInner}/></div>}

        {error && (
          <div style={S.errorBox}>
            <div style={{fontWeight:600,color:"#dc2626"}}>⚠ {error}</div>
          </div>
        )}

        {/* ── TAB SALDOS ── */}
        {tab==="balances" && <>
          <div style={S.statsGrid}>
            {(isGuest ? [
              ["Managers en liga",     sortedMembers.length,                              "#94a3b8"],
              ["⏱️ Tiempo restante",   `${timeLeft}s`,                                     timeLeft<=2?"#ef4444":"#38bdf8"],
              ["Saldos revelados",     `${revealedSet.size} / ${revealableMembers.length}`, "#22c55e"],
              ["Saldo de GabiPRO",     "🔒 Protegido",                                     "#f97316"],
            ] : [
              ["Managers en liga",    sortedMembers.length,                              "#94a3b8"],
              ["Tu saldo real (API)", ownBalance!=null ? fmt(ownBalance) : "—",          "#38bdf8"],
              ["Tu saldo estimado",   sortedMembers.find(m=>m.isOwn) ? fmt(sortedMembers.find(m=>m.isOwn).balance) : "—", "#60a5fa"],
              ["Δ Real vs Estimado",  (() => {
                const own = sortedMembers.find(m=>m.isOwn);
                if(!own || ownBalance==null) return "—";
                const d = ownBalance - own.balance;
                return `${d>=0?"+":""}${fmt(d)}`;
              })(), (() => {
                const own = sortedMembers.find(m=>m.isOwn);
                if(!own || ownBalance==null) return "#475569";
                return Math.abs(ownBalance - own.balance) < 100_000 ? "#4ade80" : "#f87171";
              })()],
              ["Saldo más alto rival", sortedMembers.filter(m=>!m.isOwn).length>0 ? fmt(Math.max(...sortedMembers.filter(m=>!m.isOwn).map(m=>m.balance))) : "—", "#4ade80"],
              ["Saldo más bajo rival", sortedMembers.filter(m=>!m.isOwn).length>0 ? fmt(Math.min(...sortedMembers.filter(m=>!m.isOwn).map(m=>m.balance))) : "—", "#f87171"],
            ]).map(([l,v,c])=>(
              <div key={l} style={S.statCard}>
                <div style={S.statLabel}>{l}</div>
                <div style={{...S.statValue,color:c}}>{v}</div>
              </div>
            ))}
          </div>

          {/* Banner del show aleatorio (solo invitado) */}
          {isGuest && (
            <div style={S.revealBar}>
              <span style={{fontSize:22}}>🎲</span>
              <div style={{flex:1,minWidth:180}}>
                <div style={{fontSize:13,color:"#1d4ed8",fontWeight:700}}>
                  Revelando saldos al azar... se cierra en {timeLeft}s
                </div>
                <div style={{fontSize:11,color:"#475569",marginTop:2}}>
                  Fíchale algo a <b>GabiPRIME</b> si quieres verlos más tiempo 😏
                </div>
              </div>
              <div style={S.countdownPill}>{timeLeft}</div>
            </div>
          )}

          <div style={S.sectionTitle}>Clasificación por saldo estimado · {sortedMembers.length} managers</div>
          <div style={S.card}>
            <table style={S.table}>
              <thead>
                <tr>{["#","Manager","Saldo Est.","Saldo Real","Δ Real/Est","Estado","Δ vs 20M","Gastado","Ingresado"].map(h=>(
                  <th key={h} style={S.th}>{h}</th>
                ))}</tr>
              </thead>
              <tbody>
                {sortedMembers.length===0 && !loading && (
                  <tr><td colSpan={9} style={{textAlign:"center",color:"#475569",padding:40}}>
                    Sin datos — comprueba la conexión
                  </td></tr>
                )}
                {sortedMembers.map((m,i) => {
                  const visible    = canSee(m.id);
                  const protectedOwn = isGuest && m.isOwn; // saldo propietario: nunca visible para invitado

                  let spent=0, earned=0;
                  for(const ev of board){
                    if(ev.type==="transfer") for(const c of (Array.isArray(ev.content) ? ev.content : [])){
                      if(c.to?.id  ===m.id) spent  += c.amount||0;
                      if(c.from?.id===m.id) earned += c.amount||0;
                    }
                    if(ev.type==="market") for(const c of (Array.isArray(ev.content) ? ev.content : [])){
                      if(c.to?.id===m.id) spent += c.amount||0;
                    }
                    if(ev.type==="exchange"){
                      const c = ev.content || {};
                      const amt    = c.amount          || 0;
                      const reqAmt = c.requestedAmount || 0;
                      if(c.from?.id===m.id){ if(reqAmt>amt) earned += reqAmt-amt; else spent += amt-reqAmt; }
                      if(c.to?.id===m.id)  { if(amt>reqAmt) earned += amt-reqAmt; else spent += reqAmt-amt; }
                    }
                  }
                  const delta      = m.balance!=null ? m.balance - START_BUDGET : null;
                  const bc         = m.balance!=null ? balClass(m.balance) : "tight";
                  const realMBal   = m.isOwn ? ownBalance : (members[m.id]?.realBalance ?? null);
                  const diffReal   = (realMBal != null && m.balance != null) ? realMBal - m.balance : null;
                  const diffColor  = diffReal == null ? "#475569"
                                   : Math.abs(diffReal) < 100_000 ? "#4ade80"
                                   : Math.abs(diffReal) < 500_000 ? "#facc15" : "#f87171";
                  const isExpanded = !protectedOwn && visible && selectedMgr === m.id;

                  // Celda de saldo según visibilidad
                  const lockCell = (txt) => (
                    <td style={{...S.td,...S.moneyCell}} colSpan={1}>
                      <span style={{color:"#94a3b8",fontWeight:600,fontSize:12}}>{txt}</span>
                    </td>
                  );

                  // Trazabilidad
                  const txs = !isExpanded ? [] : board.flatMap(ev => {
                    if(ev.type==="exchange"){
                      const c = ev.content || {};
                      if(c.from?.id!==m.id && c.to?.id!==m.id) return [];
                      const amt    = c.amount          || 0;
                      const reqAmt = c.requestedAmount || 0;
                      const net    = c.from?.id===m.id ? (reqAmt - amt) : (amt - reqAmt);
                      if(net===0) return [];
                      const contra = c.from?.id===m.id ? (c.to?.name||"?") : (c.from?.name||"?");
                      const offeredNames   = (c.offeredPlayers  ||[]).map(id => playerMap[id]?.name || `#${id}`);
                      const requestedNames = (c.requestedPlayers||[]).map(id => playerMap[id]?.name || `#${id}`);
                      const pname = c.from?.id===m.id ? offeredNames.join(", ") : requestedNames.join(", ");
                      return [{ date: ev.date, pname: pname||"Intercambio", pteam: null, amount: Math.abs(net), isBuy: net<0, contra, txType: "exchange" }];
                    }
                    if(ev.type !== "transfer" && ev.type !== "market") return [];
                    return (Array.isArray(ev.content) ? ev.content : [])
                      .filter(c => c.from?.id===m.id || c.to?.id===m.id)
                      .map(c => {
                        const isBuy  = ev.type==="market" ? true : c.to?.id===m.id;
                        const pid    = typeof c.player==="object" ? c.player?.id : c.player;
                        const pname  = typeof c.player==="object" ? c.player?.name : (playerMap[pid]?.name || `#${pid}`);
                        const pteam  = playerMap[pid]?.team || null;
                        const contra = isBuy
                          ? (ev.type==="market" ? "Mercado libre" : (c.from?.name || "Mercado libre"))
                          : (c.to?.name || "Mercado libre");
                        return { date: ev.date, pname, pteam, amount: c.amount||0, isBuy, contra, txType: ev.type };
                      });
                  }).sort((a,b)=>b.date-a.date);

                  let runBal = START_BUDGET;
                  const txsWithBal = [...txs].reverse().map(tx => {
                    runBal += tx.isBuy ? -tx.amount : tx.amount;
                    return {...tx, balAfter: runBal};
                  });

                  return (
                    <React.Fragment key={m.id}>
                      <tr
                        style={{...(m.isOwn?S.ownRow:{}), cursor:(protectedOwn||!visible)?"default":"pointer", userSelect:"none"}}
                        onClick={()=> (protectedOwn||!visible) ? null : setSelectedMgr(isExpanded ? null : m.id)}
                      >
                        <td style={{...S.td,...S.rankCell,color:i<3?"#f97316":"#475569"}}>{i+1}</td>
                        <td style={S.td}>
                          <div style={{display:"flex",alignItems:"center",gap:8}}>
                            <div style={{...S.avatar,background:isExpanded?"#f97316":"#fed7aa"}}>{initials(m.name)}</div>
                            <span>{m.name}</span>
                            {m.isOwn && <span style={S.ownBadge}>{isGuest ? "PROTEGIDO" : "TÚ"}</span>}
                            {!protectedOwn && visible && <span style={{fontSize:10,color:"#475569"}}>{isExpanded?"▲":"▼"}</span>}
                          </div>
                        </td>

                        {protectedOwn ? (
                          <>
                            <td style={S.td} colSpan={3}>
                              <span style={S.lockBadge}>🔒 Protegido</span>
                            </td>
                            <td style={S.td}>
                              <span style={S.lockBadge}>🔒</span>
                            </td>
                            <td style={S.td} colSpan={3}>
                              <span style={{color:"#94a3b8",fontSize:12}}>Saldo del propietario oculto</span>
                            </td>
                          </>
                        ) : !visible ? (
                          <>
                            <td style={S.td} colSpan={3}>
                              <span style={S.lockBadge}>🔒 Oculto</span>
                            </td>
                            <td style={S.td}>
                              <span style={S.lockBadge}>🔒</span>
                            </td>
                            <td style={S.td} colSpan={3}>
                              <span style={{color:"#94a3b8",fontSize:12}}>Selecciónalo en “Ver saldo de”</span>
                            </td>
                          </>
                        ) : (
                          <>
                            <td style={{...S.td,...S.moneyCell,color:{rich:"#4ade80",mid:"#facc15",tight:"#f87171"}[bc]}}>
                              {fmt(m.balance)}
                            </td>
                            <td style={{...S.td,...S.moneyCell,color:"#f97316"}}>
                              {realMBal != null ? fmt(realMBal) : <span style={{color:"#cbd5e1"}}>—</span>}
                            </td>
                            <td style={{...S.td,...S.moneyCell,color:diffColor}}>
                              {diffReal == null ? <span style={{color:"#cbd5e1"}}>—</span>
                                : `${diffReal>=0?"+":""}${fmt(diffReal)}`}
                            </td>
                            <td style={S.td}>
                              <span style={{...S.badge,...S.badgeColors[bc]}}>{
                                bc==="rich"?"💰 Rico":bc==="mid"?"⚖️ Medio":"🔴 Apurado"
                              }</span>
                            </td>
                            <td style={{...S.td,...S.moneyCell,color:delta>=0?"#4ade80":"#f87171"}}>
                              {delta>=0?"+":""}{fmt(delta)}
                            </td>
                            <td style={{...S.td,...S.moneyCell,color:"#dc2626"}}>-{fmt(spent)}</td>
                            <td style={{...S.td,...S.moneyCell,color:"#16a34a"}}>+{fmt(earned)}</td>
                          </>
                        )}
                      </tr>
                      {isExpanded && (
                        <tr>
                          <td colSpan={9} style={{padding:0,background:"#f8fafc",borderBottom:"2px solid #f97316"}}>
                            <div style={{padding:"12px 20px"}}>
                              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                                <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:11,letterSpacing:2,textTransform:"uppercase",color:"#3b82f6"}}>
                                  Trazabilidad de {m.name} · {txs.length} operaciones
                                </span>
                                <span style={{fontSize:12,color:"#475569"}}>
                                  20.00M inicial → <span style={{color:{rich:"#4ade80",mid:"#facc15",tight:"#f87171"}[bc],fontWeight:700}}>{fmt(m.balance)}</span> estimado
                                  {realMBal!=null && <> · <span style={{color:"#f97316",fontWeight:700}}>{fmt(realMBal)}</span> real</>}
                                </span>
                              </div>
                              {txs.length===0 ? (
                                <div style={{color:"#475569",fontSize:13,padding:"8px 0"}}>Sin operaciones registradas en el tablón</div>
                              ) : (
                                <table style={{...S.table,fontSize:12}}>
                                  <thead>
                                    <tr>
                                      {["Fecha","Jugador","Tipo","Importe","Contrapartida","Saldo tras op."].map(h=>(
                                        <th key={h} style={{...S.th,fontSize:10,padding:"6px 10px"}}>{h}</th>
                                      ))}
                                    </tr>
                                  </thead>
                                  <tbody>
                                    {[...txsWithBal].reverse().map((tx,ti)=>(
                                      <tr key={ti} style={{borderBottom:"1px solid #0a1220"}}>
                                        <td style={{...S.td,padding:"6px 10px",color:"#475569",fontSize:11}}>{fmtDate(tx.date)}</td>
                                        <td style={{...S.td,padding:"6px 10px"}}>
                                          {tx.pname}
                                          {tx.pteam && <span style={{marginLeft:5,fontSize:10,color:"#64748b"}}>{tx.pteam}</span>}
                                        </td>
                                        <td style={{...S.td,padding:"6px 10px"}}>
                                          <span style={{padding:"2px 8px",borderRadius:3,fontSize:10,fontWeight:700,
                                            background:tx.isBuy?"#fee2e2":"#dcfce7",
                                            color:tx.isBuy?"#dc2626":"#16a34a"}}>
                                            {tx.isBuy ? "COMPRA" : "VENTA"}
                                          </span>
                                        </td>
                                        <td style={{...S.td,padding:"6px 10px",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,
                                          color:tx.isBuy?"#f87171":"#4ade80"}}>
                                          {tx.isBuy?"-":"+"}{fmtK(tx.amount)}
                                        </td>
                                        <td style={{...S.td,padding:"6px 10px",color:"#94a3b8"}}>{tx.contra}</td>
                                        <td style={{...S.td,padding:"6px 10px",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,color:"#1e293b"}}>
                                          {fmt(tx.balAfter)}
                                        </td>
                                      </tr>
                                    ))}
                                  </tbody>
                                </table>
                              )}
                            </div>
                          </td>
                        </tr>
                      )}
                    </React.Fragment>
                  );
                })}
              </tbody>
            </table>
          </div>
        </>}

        {/* ── TAB TABLÓN ── */}
        {tab==="board" && <>
          <div style={{display:"flex",alignItems:"center",gap:16,marginBottom:20}}>
            <div style={S.sectionTitle} className="notitle">Tablón de eventos</div>
            <select style={S.select} value={filterUser} onChange={e=>setFilterUser(e.target.value)}>
              <option value="all">Todos los managers</option>
              {sortedMembers.map(m=>(
                <option key={m.id} value={m.id}>{m.name}</option>
              ))}
            </select>
          </div>
          <div style={S.card}>
            {filteredBoard.length===0 && !loading && (
              <div style={{padding:32,textAlign:"center",color:"#475569"}}>Sin eventos</div>
            )}
            {filteredBoard.map((ev,idx)=>(
              <div key={idx} style={S.boardEvent}>
                <div style={S.eventHeader}>
                  <span style={{...S.evType,...(ev.type==="transfer"?S.evTransfer:ev.type==="market"?S.evMarket:ev.type==="exchange"?S.evExchange:S.evMove)}}>
                    {ev.type==="transfer"?"🔄 Traspaso":ev.type==="market"?"🏪 Mercado":ev.type==="exchange"?"🔀 Intercambio":"👟 Movimientos"}
                  </span>
                  <span style={{fontSize:12,color:"#475569"}}>{fmtDate(ev.date)}</span>
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:6}}>
                  {ev.type==="exchange" && (() => {
                    const c = ev.content || {};
                    const offeredNames  = (c.offeredPlayers  ||[]).map(id => playerMap[id]?.name || `#${id}`);
                    const requestedNames= (c.requestedPlayers||[]).map(id => playerMap[id]?.name || `#${id}`);
                    return (
                      <div style={S.eventItem}>
                        <span style={{fontSize:13,color:"#059669",fontWeight:600}}>{c.from?.name||"?"}</span>
                        <span style={{color:"#475569",fontSize:11}}>ofrece</span>
                        <span style={{color:"#64748b",fontSize:12}}>{offeredNames.join(", ")||"jugadores"}</span>
                        {(c.amountHidden || c.amount > 0) && <><span style={{color:"#475569",fontSize:11}}>+</span>{moneyOrLock(c.amount, c.amountHidden, "#059669")}</>}
                        <span style={{color:"#475569",fontSize:14,fontWeight:700}}>⇄</span>
                        <span style={{fontSize:13,color:"#059669",fontWeight:600}}>{c.to?.name||"?"}</span>
                        <span style={{color:"#475569",fontSize:11}}>ofrece</span>
                        <span style={{color:"#64748b",fontSize:12}}>{requestedNames.join(", ")||"jugadores"}</span>
                        {(c.amountHidden || c.requestedAmount > 0) && <><span style={{color:"#475569",fontSize:11}}>+</span>{moneyOrLock(c.requestedAmount, c.amountHidden, "#059669")}</>}
                      </div>
                    );
                  })()}
                  {ev.type!=="exchange" && (Array.isArray(ev.content) ? ev.content : []).slice(0,6).map((c,ci)=>{
                    const name = pName(c);
                    const pos  = pPos(c);
                    const team = pTeam(c);
                    if(ev.type==="transfer") return (
                      <div key={ci} style={S.eventItem}>
                        {pos && <span style={{...S.posTag,background:posColor(pos)+"22",color:posColor(pos),border:`1px solid ${posColor(pos)}44`}}>{posLabel(pos)}</span>}
                        <span style={S.playerTag}>⚽ {name}{team && <span style={{marginLeft:4,fontSize:10,color:"#94a3b8",fontWeight:400}}>{team}</span>}</span>
                        {moneyOrLock(c.amount, c.amountHidden, "#dc2626", "-")}
                        <span style={{color:"#475569",fontSize:11}}>←</span>
                        <span style={{fontSize:13,color:"#94a3b8"}}>{c.from?.name||"Mercado"}</span>
                        {c.to && <><span style={{color:"#475569",fontSize:11}}>→</span><span style={{fontSize:13,color:"#94a3b8"}}>{c.to.name}</span></>}
                        {c.type==="clause" && <span style={{fontSize:10,color:"#64748b"}}>(cláusula)</span>}
                      </div>
                    );
                    if(ev.type==="market") return (
                      <div key={ci} style={S.eventItem}>
                        {pos && <span style={{...S.posTag,background:posColor(pos)+"22",color:posColor(pos),border:`1px solid ${posColor(pos)}44`}}>{posLabel(pos)}</span>}
                        <span style={S.playerTag}>⚽ {name}{team && <span style={{marginLeft:4,fontSize:10,color:"#94a3b8",fontWeight:400}}>{team}</span>}</span>
                        {moneyOrLock(c.amount, c.amountHidden, "#dc2626", "-")}
                        <span style={{color:"#475569",fontSize:11}}>→</span>
                        <span style={{fontSize:13,color:"#94a3b8"}}>{c.to?.name||members[c.to?.id]?.name||`User ${c.to?.id}`}</span>
                      </div>
                    );
                    return (
                      <div key={ci} style={{...S.eventItem,color:"#64748b",fontSize:12}}>
                        {c.type==="join"?"➕":"➖"} Jugador #{typeof c.player==="object"?c.player?.id:c.player}
                      </div>
                    );
                  })}
                  {(Array.isArray(ev.content) ? ev.content : []).length>6 && <div style={{fontSize:12,color:"#475569"}}>+{(Array.isArray(ev.content)?ev.content:[]).length-6} más...</div>}
                </div>
              </div>
            ))}
          </div>
        </>}

        {/* ── TAB MERCADO ── */}
        {tab==="market" && <>
          <div style={S.sectionTitle}>Jugadores en venta ahora</div>
          {!marketData && !loading && <div style={{color:"#64748b",padding:20}}>Sin datos de mercado</div>}
          {marketData && (
            <>
              <div style={S.statsGrid}>
                <div style={S.statCard}>
                  <div style={S.statLabel}>Jugadores en venta</div>
                  <div style={S.statValue}>{(marketData.sales||[]).length}</div>
                </div>
                <div style={S.statCard}>
                  <div style={S.statLabel}>Tu saldo</div>
                  <div style={{...S.statValue,color:"#f97316"}}>{isGuest ? "🔒" : fmt(ownBalance)}</div>
                </div>
              </div>
              <div style={S.card}>
                <table style={S.table}>
                  <thead>
                    <tr>{["Jugador","Pos","Precio venta","Precio mercado","Vendedor","Expira","¿Comprable?"].map(h=>(
                      <th key={h} style={S.th}>{h}</th>
                    ))}</tr>
                  </thead>
                  <tbody>
                    {(marketData.sales||[]).map((s,i)=>{
                      const pid       = s.player?.id || s.player;
                      const pn        = s.player?.name || playerMap[pid]?.name || `#${pid}`;
                      const pos       = s.player?.position || playerMap[pid]?.position;
                      const team      = playerMap[pid]?.team || null;
                      const mktPrice  = s.player?.price || playerMap[pid]?.price;
                      const canBuy    = ownBalance != null && s.price <= ownBalance;
                      const expires   = s.until ? fmtDate(s.until) : "—";
                      const seller    = s.user ? (members[s.user]?.name || `User ${s.user}`) : "Mercado";
                      return (
                        <tr key={i}>
                          <td style={S.td}>
                            {pos && <span style={{...S.posTag,background:posColor(pos)+"22",color:posColor(pos),border:`1px solid ${posColor(pos)}44`,marginRight:6}}>{posLabel(pos)}</span>}
                            {pn}
                            {team && <span style={{marginLeft:5,fontSize:10,color:"#64748b"}}>{team}</span>}
                          </td>
                          <td style={{...S.td,color:"#94a3b8"}}>{pos?posLabel(pos):"—"}</td>
                          <td style={{...S.td,...S.moneyCell,color:"#d97706"}}>{fmt(s.price)}</td>
                          <td style={{...S.td,...S.moneyCell,color:"#64748b"}}>{mktPrice?fmt(mktPrice):"—"}</td>
                          <td style={{...S.td,fontSize:13,color:"#94a3b8"}}>{seller}</td>
                          <td style={{...S.td,fontSize:12,color:"#64748b"}}>{expires}</td>
                          <td style={S.td}>
                            {isGuest ? (
                              <span style={S.lockBadge}>🔒</span>
                            ) : (
                              <span style={{padding:"3px 10px",borderRadius:4,fontSize:11,fontWeight:700,
                                background:canBuy?"#dcfce7":"#fee2e2",
                                color:canBuy?"#16a34a":"#dc2626"}}>
                                {canBuy?"✓ Sí":"✗ No"}
                              </span>
                            )}
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </>
          )}
        </>}

        {/* ── TAB JUGADORES ── */}
        {tab==="players" && <>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <div style={S.sectionTitle}>{Object.keys(playerMap).length} jugadores mapeados</div>
          </div>
          <div style={S.card}>
            <table style={S.table}>
              <thead>
                <tr>{["ID","Nombre","Posición","Precio mercado"].map(h=><th key={h} style={S.th}>{h}</th>)}</tr>
              </thead>
              <tbody>
                {Object.entries(playerMap).sort((a,b)=>(a[1].name||"").localeCompare(b[1].name||"")).map(([id,p])=>(
                  <tr key={id}>
                    <td style={{...S.td,color:"#475569",fontFamily:"monospace",fontSize:12}}>{id}</td>
                    <td style={S.td}>{p.name}</td>
                    <td style={S.td}>
                      {p.position && <span style={{...S.posTag,background:posColor(p.position)+"22",color:posColor(p.position),border:`1px solid ${posColor(p.position)}44`}}>{posLabel(p.position)}</span>}
                    </td>
                    <td style={{...S.td,...S.moneyCell,color:"#94a3b8"}}>{p.price?fmt(p.price):"—"}</td>
                  </tr>
                ))}
                {Object.keys(playerMap).length===0 && (
                  <tr><td colSpan={4} style={{textAlign:"center",color:"#475569",padding:32}}>
                    Sin jugadores mapeados aún — actualiza para cargarlos
                  </td></tr>
                )}
              </tbody>
            </table>
          </div>
        </>}

        {/* ── TAB STATS ── */}
        {tab==="stats" && <>
          <div style={S.sectionTitle}>Resumen de actividad de mercado</div>
          <div style={S.statsGrid}>
            {[
              ["🔄 Traspasos",         board.filter(e=>e.type==="transfer").length],
              ["🔀 Intercambios",      board.filter(e=>e.type==="exchange").length],
              ["🏪 Compras mercado",   board.filter(e=>e.type==="market").length],
              ["👟 Mov. plantilla",    board.filter(e=>e.type==="playerMovements").length],
              ["⚽ Jugadores únicos",  Object.keys(playerMap).length],
              ["💸 Total transacciones", (() => {
                let t=0;
                for(const ev of board){
                  if(ev.type==="transfer"||ev.type==="market")
                    for(const c of (Array.isArray(ev.content) ? ev.content : [])) t+=c.amount||0;
                }
                return fmt(t);
              })()],
            ].map(([l,v])=>(
              <div key={l} style={S.statCard}>
                <div style={S.statLabel}>{l}</div>
                <div style={S.statValue}>{v}</div>
              </div>
            ))}
          </div>

          <div style={S.sectionTitle}>Ranking actividad en mercado</div>
          <div style={S.card}>
            <table style={S.table}>
              <thead>
                <tr>{["Manager","Compras realizadas","Total gastado","Total ingresado","Saldo neto"].map(h=><th key={h} style={S.th}>{h}</th>)}</tr>
              </thead>
              <tbody>
                {sortedMembers.map(m=>{
                  const protectedOwn = isGuest && m.isOwn;
                  let spent=0, earned=0, ops=0;
                  for(const ev of board){
                    if(ev.type==="transfer") for(const c of (Array.isArray(ev.content) ? ev.content : [])){
                      if(c.to?.id  ===m.id){spent +=c.amount||0;ops++;}
                      if(c.from?.id===m.id) earned+=c.amount||0;
                    }
                    if(ev.type==="market") for(const c of (Array.isArray(ev.content) ? ev.content : [])){
                      if(c.to?.id===m.id){spent+=c.amount||0;ops++;}
                    }
                  }
                  const net = earned - spent;
                  return (
                    <tr key={m.id} style={m.isOwn?S.ownRow:{}}>
                      <td style={S.td}>
                        <div style={{display:"flex",alignItems:"center",gap:8}}>
                          <div style={S.avatar}>{initials(m.name)}</div>
                          {m.name}
                          {m.isOwn && <span style={S.ownBadge}>{isGuest ? "PROTEGIDO" : "TÚ"}</span>}
                        </div>
                      </td>
                      {protectedOwn ? (
                        <td style={S.td} colSpan={4}><span style={S.lockBadge}>🔒 Protegido</span></td>
                      ) : (
                        <>
                          <td style={{...S.td,textAlign:"center"}}>{ops}</td>
                          <td style={{...S.td,...S.moneyCell,color:"#dc2626"}}>-{fmt(spent)}</td>
                          <td style={{...S.td,...S.moneyCell,color:"#16a34a"}}>+{fmt(earned)}</td>
                          <td style={{...S.td,...S.moneyCell,color:net>=0?"#4ade80":"#f87171"}}>{net>=0?"+":""}{fmt(net)}</td>
                        </>
                      )}
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </>}
      </div>
    </div>
  );
}

// ROOT — decide entre login y app
// ─────────────────────────────────────────────────────────────────────────────
function Root() {
  const [session, setSession] = useState(() => sessionLoad());
  if (!session) return <LoginScreen onLogin={setSession} />;
  return <App session={session} onLogout={() => setSession(null)} />;
}

<!-- Bootstrap propio: compila SOLO #app-src y lo ejecuta, aislado de Babel auto-scan -->
<script>
(function () {
  var ROOT = function () { return document.getElementById("root"); };
  function fail(msg) {
    var el = ROOT();
    if (el) {
      el.innerHTML =
        '<div style="font-family:Barlow,sans-serif;max-width:520px;margin:60px auto;padding:24px;'
        + 'border:1px solid #fecaca;background:#fef2f2;border-radius:12px;color:#991b1b">'
        + '<div style="font-weight:700;font-size:18px;margin-bottom:8px">No se pudo iniciar la app</div>'
        + '<div style="font-size:14px;color:#7f1d1d">' + msg + '</div></div>';
    }
  }
  var tries = 0;
  function boot() {
    if (!window.Babel || !window.React || !window.ReactDOM) {
      if (++tries > 200) return fail("No cargaron React/Babel (¿sin conexión a unpkg.com?).");
      return setTimeout(boot, 30);
    }
    var src = document.getElementById("app-src");
    if (!src) return fail("No se encontró el código de la app (#app-src).");
    try {
      var out = window.Babel.transform(src.textContent, {
        // runtime "classic" → usa React.createElement (React es global vía UMD).
        // El runtime "automatic" inyectaría `import {jsx} from "react/jsx-runtime"`,
        // que no se puede ejecutar con eval ("Cannot use import statement outside a module").
        presets: [["react", { runtime: "classic" }]],
        sourceType: "script",
        filename: "biwenger-intel-app.jsx"
      }).code;
      (0, eval)(out); // ejecuta en ámbito global; React/ReactDOM son globales
    } catch (e) {
      console.error("[biwenger-intel] fallo al compilar/ejecutar:", e);
      fail((e && e.message) ? e.message : String(e));
    }
  }
  boot();
})();
</script>
